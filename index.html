<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1D3557">
<title>Sanix DistriPro ERP — Distribution Boissons CI</title>
<style>
/* ====================================================================
   Sanix DistriPro ERP — Charte graphique officielle
   Vert Émeraude #0F8A5F · Orange Énergie #F28C28 · Bleu Nuit #1D3557
   ==================================================================== */
:root{
  --primary:#0F8A5F; --primary-dark:#0a6e4c; --primary-light:#e6f4ee;
  --alert:#F28C28;  --alert-light:#fef0e1;
  --structure:#1D3557; --structure-2:#2a4773; --structure-light:#eef1f7;
  --danger:#DC2626; --danger-light:#fde7e7;
  --bg:#F5F7FA; --card:#ffffff; --border:#e3e8ef; --muted:#6b7785; --text:#1D3557;
  --shadow:0 2px 12px rgba(29,53,87,.08);
  --shadow-lg:0 8px 32px rgba(29,53,87,.15);
  --r-card:12px; --r-input:10px; --r-btn:8px; --r-modal:20px;
  --ff-title:"Montserrat","Roboto","Noto Sans",system-ui,sans-serif;
  --ff-body:"Poppins","Roboto","Noto Sans",system-ui,sans-serif;
  --ff-mono:"IBM Plex Mono","Roboto Mono",ui-monospace,monospace;
  --sidebar-w:240px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;font-family:var(--ff-body);
  background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;
  -webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--text)}
a{color:var(--primary);text-decoration:none}
h1,h2,h3,h4{font-family:var(--ff-title);font-weight:700;color:var(--structure);margin:0}
.mono{font-family:var(--ff-mono)}
.muted{color:var(--muted)}
.danger{color:var(--danger)}
.success{color:var(--primary)}
.warn{color:var(--alert)}

/* ============ LAYOUT ============ */
#app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;
     grid-template-rows:56px 1fr;height:100vh;
     grid-template-areas:"sb hd" "sb main"}
.topbar{grid-area:hd;background:#fff;border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;z-index:30}
.topbar .ctx{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted)}
.topbar .ctx select{border:1px solid var(--border);border-radius:8px;padding:6px 10px;
  background:#fff;font-weight:600;color:var(--structure)}
.topbar .spacer{flex:1}
.topbar .topbtn{padding:8px 12px;border-radius:var(--r-btn);background:var(--structure-light);
  color:var(--structure);font-weight:600;display:inline-flex;align-items:center;gap:6px;font-size:13px}
.topbar .topbtn:hover{background:#dde4ef}
.topbar .topbtn.danger{background:var(--danger-light);color:var(--danger)}
.topbar .badge{background:var(--danger);color:#fff;border-radius:999px;font-size:11px;
  padding:2px 7px;font-weight:700;margin-left:4px}

.sidebar{grid-area:sb;background:var(--structure);color:#cdd6e3;padding:0;overflow-y:auto;
  display:flex;flex-direction:column}
.sidebar .brand{padding:16px 18px;font-family:var(--ff-title);font-weight:900;font-size:18px;
  color:#fff;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sidebar .brand .logo{width:32px;height:32px;border-radius:8px;background:var(--primary);
  display:grid;place-items:center;color:#fff;font-weight:900;font-size:14px}
.sidebar .grp{padding:14px 18px 6px;font-size:11px;text-transform:uppercase;
  letter-spacing:.08em;color:#7b8aa3;font-weight:700}
.sidebar a.nav-item{display:flex;align-items:center;gap:10px;padding:10px 18px;
  color:#cdd6e3;font-weight:500;font-size:13.5px;border-left:3px solid transparent;cursor:pointer;position:relative}
.sidebar a.nav-item:hover{background:rgba(255,255,255,.05);color:#fff}
.sidebar a.nav-item.active{background:rgba(15,138,95,.18);color:#fff;border-left-color:var(--primary)}
.sidebar a.nav-item .ico{width:20px;text-align:center;font-size:15px}
.sidebar a.nav-item .badge-nav{margin-left:auto;background:var(--danger);color:#fff;
  font-size:10px;border-radius:999px;padding:2px 7px;font-weight:700}
.sidebar .foot{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);
  font-size:11px;color:#7b8aa3}

main{grid-area:main;overflow-y:auto;padding:20px 24px 100px;background:var(--bg)}
.view-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.view-head h2{font-size:22px;display:flex;align-items:center;gap:10px}
.view-head .sub{color:var(--muted);font-size:13px;margin-top:2px;display:block;font-weight:400}
.view-actions{display:flex;gap:8px;flex-wrap:wrap}

/* ============ MOBILE BOTTOM NAV ============ */
.bottomnav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;
  border-top:1px solid var(--border);z-index:25;padding:6px 4px 4px;
  padding-bottom:calc(4px + env(safe-area-inset-bottom));box-shadow:0 -2px 12px rgba(29,53,87,.06)}
.bottomnav .bn-row{display:grid;grid-template-columns:repeat(5,1fr);gap:2px}
.bottomnav a{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;
  font-size:10.5px;color:var(--muted);font-weight:600;border-radius:8px;text-align:center;line-height:1.1}
.bottomnav a .ico{font-size:18px}
.bottomnav a.active{color:var(--primary);background:var(--primary-light)}
.bottomnav a .badge-nav{position:absolute;background:var(--danger);color:#fff;font-size:9px;
  border-radius:999px;padding:1px 5px;font-weight:700;transform:translate(14px,-6px)}

/* ============ COMPONENTS : Cards, Tables, Forms ============ */
.card{background:var(--card);border-radius:var(--r-card);box-shadow:var(--shadow);
  padding:18px;border:1px solid var(--border)}
.card h3{font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.grid{display:grid;gap:14px}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-4{grid-template-columns:repeat(4,1fr)}

.kpi{background:var(--card);border-radius:var(--r-card);padding:14px 16px;border:1px solid var(--border);
  display:flex;flex-direction:column;gap:4px;position:relative;overflow:hidden}
.kpi .lbl{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.kpi .val{font-family:var(--ff-title);font-size:22px;font-weight:800;color:var(--structure)}
.kpi .delta{font-size:11.5px;color:var(--muted)}
.kpi.ok{border-left:4px solid var(--primary)}
.kpi.warn{border-left:4px solid var(--alert)}
.kpi.bad{border-left:4px solid var(--danger)}
.kpi.info{border-left:4px solid var(--structure-2)}
.kpi .ico{position:absolute;top:10px;right:12px;font-size:22px;opacity:.18}

.btn{display:inline-flex;align-items:center;gap:6px;background:var(--primary);color:#fff;
  font-weight:600;padding:9px 14px;border-radius:var(--r-btn);font-size:13.5px;
  transition:transform .05s, background .15s;border:none}
.btn:hover{background:var(--primary-dark)}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:#fff;color:var(--structure);border:1px solid var(--border)}
.btn.ghost:hover{background:var(--bg)}
.btn.alert{background:var(--alert)}
.btn.alert:hover{background:#d97a1d}
.btn.danger{background:var(--danger)}
.btn.danger:hover{background:#b91c1c}
.btn.sm{padding:6px 10px;font-size:12px;border-radius:6px}
.btn.lg{padding:12px 20px;font-size:15px}
.btn.block{display:flex;width:100%;justify-content:center}

table.tbl{width:100%;border-collapse:collapse;font-size:13.5px;background:#fff;
  border-radius:var(--r-card);overflow:hidden;box-shadow:var(--shadow)}
table.tbl th{background:var(--structure-light);color:var(--structure);
  text-align:left;padding:10px 12px;font-size:12px;font-weight:700;
  text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border)}
table.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top}
table.tbl tr:last-child td{border-bottom:none}
table.tbl tr:hover td{background:#fafbfd}
table.tbl td .pill{display:inline-block;padding:2px 8px;border-radius:999px;
  font-size:11px;font-weight:700;text-transform:uppercase}
.pill.ok{background:var(--primary-light);color:var(--primary-dark)}
.pill.warn{background:var(--alert-light);color:#a35a16}
.pill.bad{background:var(--danger-light);color:var(--danger)}
.pill.info{background:var(--structure-light);color:var(--structure)}
.pill.muted{background:#eef1f5;color:var(--muted)}

.fld{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.fld label{font-size:12px;font-weight:600;color:var(--structure);text-transform:uppercase;letter-spacing:.03em}
.fld input,.fld select,.fld textarea{padding:10px 12px;border:1px solid var(--border);
  border-radius:var(--r-input);background:#fff;outline:none;transition:border-color .15s}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(15,138,95,.12)}
.fld .hint{font-size:11.5px;color:var(--muted)}
.row{display:grid;gap:12px}
.row-2{grid-template-columns:1fr 1fr}
.row-3{grid-template-columns:repeat(3,1fr)}

.search{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--border);
  border-radius:var(--r-input);padding:7px 12px;min-width:220px}
.search input{border:none;outline:none;flex:1;background:transparent}

.tabs{display:flex;gap:4px;background:#fff;padding:4px;border-radius:10px;
  border:1px solid var(--border);margin-bottom:14px;flex-wrap:wrap}
.tabs button{padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--muted)}
.tabs button.active{background:var(--primary);color:#fff}

.empty{text-align:center;padding:40px 20px;color:var(--muted);background:#fff;
  border:1px dashed var(--border);border-radius:var(--r-card)}
.empty .ico{font-size:40px;display:block;margin-bottom:8px;opacity:.5}

/* ============ MODAL ============ */
.mask{position:fixed;inset:0;background:rgba(29,53,87,.55);backdrop-filter:blur(2px);
  z-index:100;display:none;align-items:flex-end;justify-content:center;padding:0}
.mask.open{display:flex;animation:fadein .15s}
.modal{background:#fff;border-radius:var(--r-modal) var(--r-modal) 0 0;
  width:100%;max-width:640px;max-height:92vh;overflow-y:auto;
  box-shadow:var(--shadow-lg);animation:slideup .25s cubic-bezier(.2,.8,.3,1)}
@media(min-width:700px){.mask{align-items:center;padding:24px}
  .modal{border-radius:var(--r-modal);max-height:88vh}}
.modal .hd{padding:16px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:#fff;z-index:5}
.modal .hd h3{font-size:16px;display:flex;align-items:center;gap:8px}
.modal .bd{padding:18px}
.modal .ft{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;
  position:sticky;bottom:0;background:#fff}
.x{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;
  background:var(--bg);color:var(--muted);font-size:18px;font-weight:700}
.x:hover{background:#e6eaf0;color:var(--structure)}

@keyframes fadein{from{opacity:0}to{opacity:1}}
@keyframes slideup{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}

/* ============ TOASTS ============ */
.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;
  max-width:calc(100vw - 28px)}
.toast{background:var(--structure);color:#fff;padding:10px 14px;border-radius:10px;
  box-shadow:var(--shadow-lg);font-size:13px;font-weight:500;animation:slideleft .2s;display:flex;align-items:center;gap:8px}
.toast.ok{background:var(--primary)}
.toast.err{background:var(--danger)}
.toast.warn{background:var(--alert)}
@keyframes slideleft{from{transform:translateX(60px);opacity:0}to{transform:none;opacity:1}}

/* ============ Embedded chart ============ */
.barchart{display:flex;align-items:flex-end;gap:8px;height:140px;padding:8px 0;border-bottom:1px solid var(--border)}
.barchart .bar{flex:1;background:linear-gradient(to top,var(--primary),#3bae82);
  border-radius:6px 6px 0 0;position:relative;min-height:4px;display:flex;align-items:flex-end;justify-content:center;color:#fff;
  font-size:10px;font-weight:700;padding:4px 2px;transition:all .3s}
.barchart .bar .lbl{position:absolute;bottom:-22px;color:var(--muted);font-size:10.5px;font-weight:500;text-align:center;width:100%}
.barchart-wrap{position:relative;padding-bottom:24px}

/* ============ Distribution tree ============ */
.tree{font-size:13.5px}
.tree-node{padding:10px 12px;background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;
  display:flex;align-items:center;gap:10px}
.tree-node.lvl-1{margin-left:0;border-left:4px solid var(--structure-2)}
.tree-node.lvl-2{margin-left:24px;border-left:4px solid var(--primary)}
.tree-node.lvl-3{margin-left:48px;border-left:4px solid var(--alert)}
.tree-node .info{flex:1}
.tree-node .info .nm{font-weight:700;color:var(--structure)}
.tree-node .info .meta{font-size:11.5px;color:var(--muted)}

/* ============ Invoice print ============ */
.fne{background:#fff;border:1px solid var(--border);border-radius:12px;padding:24px;font-family:var(--ff-mono);font-size:12px}
.fne .hd{display:flex;justify-content:space-between;border-bottom:2px solid var(--structure);padding-bottom:12px;margin-bottom:12px}
.fne .hd .lo{font-family:var(--ff-title);font-size:18px;font-weight:900;color:var(--structure)}
.fne .hd .qr{width:90px;height:90px;background:repeating-linear-gradient(45deg,#1D3557,#1D3557 3px,#fff 3px,#fff 6px);
  border-radius:6px;display:grid;place-items:center;color:#fff;font-size:9px;text-align:center;line-height:1.1}
.fne table{width:100%;border-collapse:collapse;margin:10px 0;font-size:11.5px}
.fne table th,.fne table td{border:1px solid var(--border);padding:6px 8px;text-align:left}
.fne table th{background:var(--structure-light);font-family:var(--ff-title)}
.fne .totals{margin-top:8px;text-align:right;font-size:13px}
.fne .totals .ttc{font-family:var(--ff-title);font-size:16px;font-weight:900;color:var(--structure)}
.fne .lett{font-style:italic;color:var(--muted);margin-top:6px;font-size:11.5px}
.fne .ft{border-top:1px dashed var(--border);margin-top:14px;padding-top:8px;font-size:10.5px;color:var(--muted);text-align:center}

/* ============ Section headers in forms ============ */
.section-title{font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;
  color:var(--muted);margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.section-title:first-child{margin-top:0}

/* ============ Mobile responsive ============ */
@media(max-width:768px){
  #app{grid-template-columns:1fr;grid-template-rows:56px 1fr;grid-template-areas:"hd" "main"}
  .sidebar{display:none}
  .bottomnav{display:block}
  main{padding:14px 12px 84px}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .grid-4.kpis{grid-template-columns:repeat(2,1fr)}
  .row-2,.row-3{grid-template-columns:1fr}
  .view-head h2{font-size:18px}
  table.tbl{font-size:12px}
  table.tbl th,table.tbl td{padding:8px 6px}
  .topbar{padding:0 10px}
  .topbar .topbtn span.label{display:none}
  .topbar .ctx{font-size:12px}
  .topbar .ctx select{padding:5px 8px;font-size:12px}
}
@media(max-width:480px){
  .grid-4.kpis{grid-template-columns:1fr}
  .tabs{font-size:11px;overflow-x:auto;flex-wrap:nowrap}
  .tabs button{white-space:nowrap}
}

/* table mobile cards */
@media(max-width:600px){
  table.tbl.responsive{display:block;background:transparent;box-shadow:none}
  table.tbl.responsive thead{display:none}
  table.tbl.responsive tr{display:block;background:#fff;border-radius:12px;padding:10px;
    margin-bottom:8px;border:1px solid var(--border)}
  table.tbl.responsive td{display:flex;justify-content:space-between;border:none;padding:5px 0;font-size:13px}
  table.tbl.responsive td:before{content:attr(data-lbl);font-size:11px;color:var(--muted);
    text-transform:uppercase;font-weight:600;letter-spacing:.04em}
}

/* helpers */
.hide-mobile{}
@media(max-width:768px){.hide-mobile{display:none!important}}
.hide-desktop{display:none}
@media(max-width:768px){.hide-desktop{display:initial}}
.flex{display:flex;align-items:center;gap:8px}
.flex.between{justify-content:space-between}
.flex.wrap{flex-wrap:wrap}
.mt-1{margin-top:8px}.mt-2{margin-top:14px}.mt-3{margin-top:20px}
.mb-1{margin-bottom:8px}.mb-2{margin-bottom:14px}.mb-3{margin-bottom:20px}
.b700{font-weight:700}.f12{font-size:12px}.f13{font-size:13px}.f15{font-size:15px}
.nowrap{white-space:nowrap}
.right{text-align:right}
.center{text-align:center}
</style>
</head>
<body>
<!-- ====================================================================
     ÉCRAN DE LOGIN LOCAL — SIMPLE ET DÉFINITIF (v2.14)
     Mot de passe local hashé · Pas de cloud requis · Marche offline
     ==================================================================== -->
<div id="loginOverlay" style="display:none;position:fixed;inset:0;z-index:9000;background:linear-gradient(135deg,#0F8A5F 0%,#1D3557 100%);align-items:center;justify-content:center;padding:20px;color:#fff;overflow-y:auto">
  <div style="max-width:400px;width:100%;background:rgba(255,255,255,.1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:20px;padding:32px 28px;box-shadow:0 20px 60px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.15)">

    <div style="text-align:center;margin-bottom:24px">
      <div style="background:#fff;color:#0F8A5F;width:72px;height:72px;border-radius:18px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;margin-bottom:14px;box-shadow:0 8px 24px rgba(0,0,0,.25)">SD</div>
      <h1 style="margin:0;font-size:22px;font-weight:900">Sanix DistriPro ERP</h1>
      <p id="loginSubtitle" style="margin:6px 0 0;opacity:.85;font-size:13px">Entrez votre mot de passe administrateur</p>
    </div>

    <!-- Formulaire login -->
    <div id="loginForm">
      <div class="login-fld" style="margin-bottom:14px">
        <label style="display:block;margin-bottom:6px;font-size:12px;font-weight:600;opacity:.9">Mot de passe</label>
        <input id="loginPwd" type="password" autocomplete="current-password" placeholder="••••••••" style="width:100%;padding:14px;background:rgba(255,255,255,.95);color:#1D3557;border:none;border-radius:10px;font-size:16px;font-weight:600;box-sizing:border-box;text-align:center;letter-spacing:.1em" onkeypress="if(event.key==='Enter')doLocalLogin()" autofocus>
      </div>

      <!-- Champ confirmation (premier setup uniquement) -->
      <div id="loginPwd2Wrap" class="login-fld" style="margin-bottom:14px;display:none">
        <label style="display:block;margin-bottom:6px;font-size:12px;font-weight:600;opacity:.9">Confirmer le mot de passe</label>
        <input id="loginPwd2" type="password" autocomplete="new-password" placeholder="••••••••" style="width:100%;padding:14px;background:rgba(255,255,255,.95);color:#1D3557;border:none;border-radius:10px;font-size:16px;font-weight:600;box-sizing:border-box;text-align:center;letter-spacing:.1em" onkeypress="if(event.key==='Enter')doLocalLogin()">
      </div>

      <div id="loginError" style="display:none;background:rgba(220,38,38,.2);border:1px solid rgba(220,38,38,.5);color:#fecaca;padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:14px;text-align:center"></div>

      <button id="loginBtn" onclick="doLocalLogin()" style="display:block;width:100%;background:#fff;color:#0F8A5F;border:none;padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:14px;box-shadow:0 4px 12px rgba(0,0,0,.2)">🔐 Entrer</button>

      <button id="loginForgotBtn" onclick="forgotLocalPwd()" style="display:none;background:transparent;color:rgba(255,255,255,.6);border:none;padding:8px;width:100%;font-size:12px;cursor:pointer;text-decoration:underline">Mot de passe oublié ?</button>
    </div>

    <div style="text-align:center;margin-top:28px;padding-top:18px;border-top:1px solid rgba(255,255,255,.1);opacity:.55;font-size:10px;line-height:1.6">
      <strong>Sanix Africa Division Technologies</strong><br>
      Cyrille KESSIE · <a href="tel:+22507791810750" style="color:#fff;text-decoration:none">+225 07 79 18 10 75</a>
    </div>
  </div>
</div>

<!-- ====================================================================
     APP STRUCTURE
     ==================================================================== -->
<div id="app">
  <aside class="sidebar" id="sidebar"></aside>
  <header class="topbar">
    <button class="topbtn hide-desktop" onclick="toggleMobileMenu()" title="Menu">☰</button>
    <div class="ctx hide-mobile">
      <span>📍 Contexte</span>
      <select id="depotCtx" onchange="changeDepotContext(this.value)"></select>
    </div>

// ============ STORAGE LAYER (localStorage + fallback mémoire) ============
const STORAGE_KEY = "sanix_distripro_v2";
const LEGACY_STORAGE_KEYS = ["afribar_v2"]; // migration depuis ancienne marque
let _mem = null;
function storageAvailable(){
  try{const k="__t__";localStorage.setItem(k,"1");localStorage.removeItem(k);return true;}catch(e){return false;}
}
const HAS_LS = storageAvailable();

function loadState(){
  if(HAS_LS){
    let raw = localStorage.getItem(STORAGE_KEY);
    // Migration : essaye les anciennes clés si pas trouvé
    if(!raw){
      for(const k of LEGACY_STORAGE_KEYS){
        const old = localStorage.getItem(k);
        if(old){
          raw = old;
          localStorage.setItem(STORAGE_KEY, old); // copie sous la nouvelle clé
          localStorage.removeItem(k);
          break;
        }
      }
    }
    if(raw){try{return JSON.parse(raw);}catch(e){console.warn("State corrupted, reset.");}}
  } else if (_mem) return _mem;
  return null;
}
function saveState(){
  const data = JSON.stringify(STATE);
  if(HAS_LS) localStorage.setItem(STORAGE_KEY, data);
  else _mem = JSON.parse(data);
  if(typeof markSyncDirty === 'function') markSyncDirty();
}
function nuke(){
  if(HAS_LS){
    localStorage.removeItem(STORAGE_KEY);
    LEGACY_STORAGE_KEYS.forEach(k=>localStorage.removeItem(k));
  }
  _mem = null;
}

// montant en lettres (français, jusqu'au milliard) — exigence FNE
function nbEnLettres(n){
  n = Math.floor(Number(n)||0);
  if(n===0) return "zéro";
  const u=["","un","deux","trois","quatre","cinq","six","sept","huit","neuf","dix","onze","douze","treize","quatorze","quinze","seize","dix-sept","dix-huit","dix-neuf"];
  const d=["","","vingt","trente","quarante","cinquante","soixante","soixante","quatre-vingt","quatre-vingt"];
  function under1000(x){
    let s="", c=Math.floor(x/100), r=x%100;
    if(c>1) s+=u[c]+" cent"+(r===0?"s":"")+" ";
    else if(c===1) s+="cent ";
    if(r<20) s+=u[r];
    else{
      const di=Math.floor(r/10), un=r%10;
      let pr=d[di];
      if(di===7||di===9) pr=d[di]+(un===1&&di===7?" et ":"-")+u[10+un];
      else if(un===1&&di!==8) pr+=" et "+u[un];
      else if(un>0) pr+="-"+u[un];
      else if(di===8) pr+="s";
      s+=pr;
    }
    return s.trim();
  }
  let parts=[];
  const g=Math.floor(n/1000000000); n%=1000000000;
  const m=Math.floor(n/1000000); n%=1000000;
  const k=Math.floor(n/1000); n%=1000;
  if(g>0) parts.push(under1000(g)+" milliard"+(g>1?"s":""));
  if(m>0) parts.push(under1000(m)+" million"+(m>1?"s":""));
  if(k>0) parts.push((k>1?under1000(k)+" ":k===1?"":"")+"mille");
  if(n>0) parts.push(under1000(n));
  return parts.join(" ").trim();
}

    }
    // Consignations actives par article récupérable (montant net après retour FIFO)
    let remC = C.casiers_rapportes, remB = C.btl_rapportees;
    s.lignes.forEach(l=>{
      const a = STATE.articles.find(x=>x.id===l.a);
      if(a.type_emballage!=="recuperable") return;
      const qty_btl_total = l.c*a.btl_par_casier + l.b;
      const allocC = Math.min(l.c, remC); remC -= allocC;
      const allocB = Math.min(qty_btl_total, remB); remB -= allocB;
      const qteC_rest = l.c - allocC, qteB_rest = qty_btl_total - allocB;
      const valRest = qteC_rest*a.consigne_casier + qteB_rest*a.consigne_btl;
      if(qteC_rest>0 || qteB_rest>0){
        STATE.consignations.push({
          id:uid("cs_"), date_sortie:dt, client_id:s.client, facture_id:facId,
          article_id:a.id,
          qte_casiers_initiale:l.c, qte_btl_initiale:qty_btl_total,
          qte_casiers:qteC_rest, qte_btl:qteB_rest,
          valeur_initiale: l.c*a.consigne_casier + qty_btl_total*a.consigne_btl,
          valeur: valRest, statut:"active"
        });
      }
    });
    if(payAmount>0){
      STATE.encaissements.push({
        id:uid("en_"), date:dt, client_id:s.client, facture_id:facId,
        mode: "Wave", montant:payAmount, reference:"Wv-"+Math.floor(Math.random()*900000+100000)
      });
    }
  });
}

function articleStock(article_id){
  // recalcule depuis mouvements (source de vérité) si présent, sinon valeur initiale
  const a = STATE.articles.find(x=>x.id===article_id);
  if(!a) return {liquide:0,btl_vide:0,casier_vide:0};
  // base : valeurs initiales (semées) + delta mouvements
  const mvts = STATE.mouvements.filter(m=>m.article_id===article_id);
  let liquide = a.stock_liquide || 0;
  let btl = a.stock_btl_vide || 0;
  let cas = a.stock_casier_vide || 0;
  mvts.forEach(m=>{
    if(m.type==="achat"){ liquide += (m.qte_liquide||0); btl += (m.qte_btl||0); cas += (m.qte_casier||0); }
    else if(m.type==="vente"){ liquide += (m.qte_liquide||0); /* btl/cas restent côté client → consignation */ }
    else if(m.type==="retour_emballage"){ btl += (m.qte_btl||0); cas += (m.qte_casier||0); }
    else if(m.type==="transfert_out"){ liquide += (m.qte_liquide||0); btl += (m.qte_btl||0); cas += (m.qte_casier||0); }
    else if(m.type==="transfert_in"){  liquide += (m.qte_liquide||0); btl += (m.qte_btl||0); cas += (m.qte_casier||0); }
    else if(m.type==="ajustement"){ liquide += (m.qte_liquide||0); btl += (m.qte_btl||0); cas += (m.qte_casier||0); }
    else if(m.type==="perte"){ liquide += (m.qte_liquide||0); btl += (m.qte_btl||0); cas += (m.qte_casier||0); }
    else if(m.type==="retour_marchandise"){ liquide += (m.qte_liquide||0); btl += (m.qte_btl||0); cas += (m.qte_casier||0); }
  });
  return {liquide,btl_vide:btl,casier_vide:cas};
}
function articleStockAll(){
  return STATE.articles.map(a=>({article:a, ...articleStock(a.id)}));
}

// ---------- SURVEILLANCE EMBALLAGES ----------
VIEWS.surveillance = function(){
  const w = document.createElement("div");
  const seuilO = STATE.config.seuils.alerte_emb_orange;
  const seuilR = STATE.config.seuils.alerte_emb_rouge;
  const consignations = STATE.consignations.filter(c=>c.statut==="active")
    .map(c=>({...c, jours: daysBetween(c.date_sortie)}))
    .sort((a,b)=>b.jours - a.jours);
  const rouges = consignations.filter(c=>c.jours>=seuilR);
  const oranges = consignations.filter(c=>c.jours>=seuilO && c.jours<seuilR);
  const verts = consignations.filter(c=>c.jours<seuilO);
  const valTot = consignations.reduce((s,c)=>s+c.valeur, 0);
  w.innerHTML = `
    <div class="view-head">
      <div><h2>🚨 Surveillance emballages <span class="sub">Suivi des consignations actives — alertes ${seuilO}j / ${seuilR}j</span></h2></div>
      <div class="view-actions">
        <button class="btn alert" onclick="openModal('retourEmballageDifere')">♻️ Retour différé</button>
      </div>
    </div>
    <div class="grid grid-4 kpis mb-3">
      <div class="kpi bad"><span class="ico">🔴</span><span class="lbl">Critique (≥${seuilR}j)</span><span class="val">${rouges.length}</span></div>
      <div class="kpi warn"><span class="ico">🟠</span><span class="lbl">Attention (${seuilO}-${seuilR-1}j)</span><span class="val">${oranges.length}</span></div>
      <div class="kpi ok"><span class="ico">🟢</span><span class="lbl">Normal (&lt;${seuilO}j)</span><span class="val">${verts.length}</span></div>
      <div class="kpi info"><span class="ico">💰</span><span class="lbl">Valeur exposée</span><span class="val">${fmtFCFA(valTot)}</span></div>
    </div>
    ${consignations.length===0
      ? '<div class="empty"><span class="ico">✅</span>Aucune consignation active. Tous les emballages ont été rendus.</div>'
      : `<table class="tbl responsive"><thead><tr><th>Client</th><th>Sortie</th><th>Jours</th><th>Article</th><th>Casiers</th><th>Btl</th><th>Valeur</th><th>Actions</th></tr></thead><tbody>
        ${consignations.map(c=>{
          const cl = getClient(c.client_id);
          const a = getArticle(c.article_id);
          const lvl = c.jours>=seuilR?"bad":(c.jours>=seuilO?"warn":"ok");
          return `<tr>
            <td data-lbl="Client"><strong>${escapeHtml(cl?.nom||"?")}</strong><br><span class="f12 muted">${escapeHtml(cl?.type||"")}</span></td>
            <td data-lbl="Sortie">${fmtDate(c.date_sortie)}</td>
            <td data-lbl="Jours"><span class="pill ${lvl}">${c.jours}j</span></td>
            <td data-lbl="Article">${escapeHtml(a?.nom||"?")}</td>
            <td data-lbl="Casiers">${c.qte_casiers}</td>
            <td data-lbl="Btl">${c.qte_btl}</td>
            <td data-lbl="Valeur" class="b700">${fmtFCFA(c.valeur)}</td>
            <td data-lbl="Actions">
              <a class="btn sm ghost" href="tel:${escapeHtml(cl?.telephone||'')}">📞</a>
              <button class="btn sm" onclick="openModal('retourEmballageDifere','${c.id}')">♻️</button>
              <button class="btn sm danger" onclick="signalerPerte('${c.id}')">❌</button>
            </td>
          </tr>`;
        }).join("")}</tbody></table>`}
  `;
  return w;
};

      <div class="info"><div class="nm">${escapeHtml(c.nom)}</div>
        <div class="meta">NIF ${escapeHtml(c.nif)} · ${escapeHtml(c.territoire)} · ${escapeHtml(c.produits||"")}</div></div></div>`;
  });
  html += `</div></div>`;
  html += `<div class="card mb-2"><h3>Niveau 2 & 3 — Réseau de dépôts</h3><div class="tree">`;
  STATE.depots.filter(d=>d.type==="depot").forEach(d=>{
    html += `<div class="tree-node lvl-2"><span style="font-size:18px">🏬</span>
      <div class="info"><div class="nm">${escapeHtml(d.nom)}</div>
        <div class="meta">${escapeHtml(d.adresse)} · Manager : ${escapeHtml(d.manager)}</div></div></div>`;
    STATE.depots.filter(sd=>sd.parent_id===d.id).forEach(sd=>{
      html += `<div class="tree-node lvl-3"><span style="font-size:18px">🏪</span>
        <div class="info"><div class="nm">${escapeHtml(sd.nom)}</div>
          <div class="meta">Rattaché à ${escapeHtml(d.nom)} · Manager : ${escapeHtml(sd.manager)}</div></div></div>`;

  html += `</div></div>`;
  html += `<div class="card"><h3>Niveau 4 — Clients finals</h3>

  </div>`;
  w.innerHTML = html;
  return w;
};

const MODALS = {};

// helpers de modaux
function modalShell(title, bodyHTML, footHTML){
  const f = document.createDocumentFragment();
  const hd = document.createElement("div"); hd.className="hd";
  hd.innerHTML = `<h3>${title}</h3><button class="x" onclick="closeModal()">×</button>`;
  const bd = document.createElement("div"); bd.className="bd"; bd.innerHTML = bodyHTML;
  const ft = document.createElement("div"); ft.className="ft"; ft.innerHTML = footHTML;
  f.appendChild(hd); f.appendChild(bd); f.appendChild(ft);
  return f;
}

// ====================================================================
// Expansion compact line → 3 lignes (liquide + btl_consigné + casier_consigné)
// Conforme à la pratique DGI : consigne hors TVA, facturée au montant plein
// ====================================================================
function expandFactureLine(compactLine){
  const a = getArticle(compactLine.article_id);
  if(!a) return [];
  const out = [];
  const qty_btl_total = (compactLine.casiers||0) * a.btl_par_casier + (compactLine.btl||0);
  // Ligne 1 : Liquide (toujours, TVA applicable)
  out.push({
    article_id: a.id, type:"liquide",
    designation: a.nom + " — Liquide",
    qty: qty_btl_total, unite:"btl",
    prix_unitaire: a.prix_btl,
    montant: qty_btl_total * a.prix_btl,
    taxable: true,
    casiers_input: compactLine.casiers||0,
    btl_input: compactLine.btl||0,
  });
  if(a.type_emballage === "recuperable"){
    // Ligne 2 : Bouteilles vides consignées (pas de TVA)
    if(qty_btl_total > 0) out.push({
      article_id: a.id, type:"consigne_btl",
      designation: "Bouteilles vides consignées — " + a.nom,
      qty: qty_btl_total, unite:"btl",
      prix_unitaire: a.consigne_btl,
      montant: qty_btl_total * a.consigne_btl,
      taxable: false,
    });
    // Ligne 3 : Casiers vides consignés (pas de TVA, seulement si casiers > 0)
    if((compactLine.casiers||0) > 0) out.push({
      article_id: a.id, type:"consigne_casier",
      designation: "Casiers vides consignés — " + a.nom,
      qty: compactLine.casiers, unite:"cas",
      prix_unitaire: a.consigne_casier,
      montant: compactLine.casiers * a.consigne_casier,
      taxable: false,
    });
  }
  return out;
}

function computeFactureFromCompact(compactLignes, casiersRapportes, btlRapportees){
  const lignes = compactLignes.flatMap(expandFactureLine);
  const tvaPct = STATE.config.depot.tva || 18;
  // Sommes par type
  const liquide_ht = lignes.filter(l=>l.type==="liquide").reduce((s,l)=>s+l.montant, 0);
  const consigne_btl_brute = lignes.filter(l=>l.type==="consigne_btl").reduce((s,l)=>s+l.montant, 0);
  const consigne_cas_brute = lignes.filter(l=>l.type==="consigne_casier").reduce((s,l)=>s+l.montant, 0);
  const consigne_brute = consigne_btl_brute + consigne_cas_brute;
  const tva = Math.round(liquide_ht * tvaPct / 100);

  // Capacités max retour : ne peut pas dépasser le facturé
  const total_btl_billed = lignes.filter(l=>l.type==="consigne_btl").reduce((s,l)=>s+l.qty, 0);
  const total_cas_billed = lignes.filter(l=>l.type==="consigne_casier").reduce((s,l)=>s+l.qty, 0);
  const rb_capped = Math.min(btlRapportees||0, total_btl_billed);
  const rc_capped = Math.min(casiersRapportes||0, total_cas_billed);

  // Valorisation du retour (au taux du 1er article récupérable)
  const taux_btl = lignes.find(l=>l.type==="consigne_btl")?.prix_unitaire || 25;
  const taux_cas = lignes.find(l=>l.type==="consigne_casier")?.prix_unitaire || 300;
  const retour_btl_val = rb_capped * taux_btl;
  const retour_cas_val = rc_capped * taux_cas;
  const retour_immediat = retour_btl_val + retour_cas_val;
  const consigne_nette = consigne_brute - retour_immediat;
  const ttc = liquide_ht + tva + consigne_nette;

  return { lignes,
    montant_liquide_ht: liquide_ht, montant_tva: tva,
    montant_consigne_btl_brute: consigne_btl_brute,
    montant_consigne_casier_brute: consigne_cas_brute,
    montant_consigne_brute: consigne_brute,
    casiers_rapportes: rc_capped, btl_rapportees: rb_capped,
    montant_retour_btl: retour_btl_val, montant_retour_casier: retour_cas_val,
    montant_retour_immediat: retour_immediat,
    montant_consigne_nette: consigne_nette,
    montant_ttc: ttc,
    total_btl_billed, total_cas_billed,
  };
}

function recomputeFac(){
  const rc = parseInt($("#m_rc")?.value)||0;
  const rb = parseInt($("#m_rb")?.value)||0;
  const C = computeFactureFromCompact(_facLignes, rc, rb);

  if($("#liq_ht")) $("#liq_ht").textContent = fmtFCFA(C.montant_liquide_ht);
  if($("#tva")) $("#tva").textContent = fmtFCFA(C.montant_tva);
  if($("#cons_br")) $("#cons_br").textContent = fmtFCFA(C.montant_consigne_brute);
  if($("#ret_imm")) $("#ret_imm").textContent = "− " + fmtFCFA(C.montant_retour_immediat);
  if($("#cons_net")) $("#cons_net").textContent = fmtFCFA(C.montant_consigne_nette);
  if($("#ttc")) $("#ttc").textContent = fmtFCFA(C.montant_ttc);

  // Détail des lignes générées (preview live)
  const previewBox = $("#linesPreview");
  if(previewBox){
    if(C.lignes.length===0){
      previewBox.innerHTML = '<div class="muted f12">Aucune ligne — ajoutez un produit ci-dessus</div>';
    } else {
      previewBox.innerHTML = `<div class="f12 mb-1 muted">📋 ${C.lignes.length} ligne(s) générée(s) sur la facture FNE :</div>
        <table style="width:100%;font-size:11.5px;border-collapse:collapse">
          ${C.lignes.map(l=>`<tr style="border-bottom:1px dashed var(--border)">
            <td style="padding:3px 4px">${l.type==="liquide"?"💧":l.type==="consigne_btl"?"🍺":"🧺"} ${escapeHtml(l.designation)}</td>
            <td style="padding:3px 4px" class="right">${l.qty} ${l.unite}</td>
            <td style="padding:3px 4px" class="right">× ${fmtFCFA(l.prix_unitaire)}</td>
            <td style="padding:3px 4px" class="right b700">${fmtFCFA(l.montant)}</td>
            <td style="padding:3px 4px" class="f12 muted">${l.taxable?"TVA":"hors TVA"}</td>
          </tr>`).join("")}
        </table>`;
    }
  }

  // Info emballages (capping warning)
  if($("#emballageInfo")){
    if(C.total_btl_billed===0 && C.total_cas_billed===0){
      $("#emballageInfo").innerHTML = `<div class="f13 muted">Aucun emballage récupérable dans cette commande (produits perdus uniquement).</div>`;
      $("#emballageInfo").style.display = _facLignes.length?'block':'none';
    } else {
      const cappedC = (parseInt($("#m_rc")?.value)||0) > C.total_cas_billed;
      const cappedB = (parseInt($("#m_rb")?.value)||0) > C.total_btl_billed;
      $("#emballageInfo").innerHTML = `
        <div class="f13"><strong>📦 Vides facturés (consigne) :</strong> ${C.total_cas_billed} casier(s) + ${C.total_btl_billed} btl → <strong>${fmtFCFA(C.montant_consigne_brute)}</strong></div>
        <div class="f13"><strong>♻️ Retour à la livraison :</strong> ${C.casiers_rapportes} casier(s) + ${C.btl_rapportees} btl → avoir de <strong>${fmtFCFA(C.montant_retour_immediat)}</strong></div>
        ${cappedC||cappedB?`<div class="f12 warn">⚠️ Retour plafonné au facturé (impossible de retourner plus que vendu sur cette facture)</div>`:''}
        <div class="f13 b700 ${C.montant_consigne_nette===0?'success':'warn'}">
          ${C.montant_consigne_nette===0?'✓ Aucune consignation ouverte (retour complet à la livraison)':'⚠️ Consignation ouverte : '+fmtFCFA(C.montant_consigne_nette)+' (à récupérer du client)'}
        </div>`;
    }
  }
}
function saveFacture(){
  if(_facLignes.length===0){ toast("Aucune ligne de facture","error"); return; }
  const client_id = $("#m_cl").value;
  const dt = new Date($("#m_dt").value).toISOString();
  const rc = parseInt($("#m_rc").value)||0;
  const rb = parseInt($("#m_rb").value)||0;
  const C = computeFactureFromCompact(_facLignes, rc, rb);
  const numero = "FNE-"+(2026000 + STATE.factures.length + 1);
  const facId = uid("fc_");
  const pm = $("#m_pm").value;
  const pmt = parseInt($("#m_pmt").value)||0;
  const ttc = C.montant_ttc;

  const fac = {
    id: facId, numero, date:dt, client_id, depot_id: STATE.config.contexte_depot_id,
    lignes: C.lignes,                       // 3 lignes par produit récup, 1 si perdu
    compact_lignes: _facLignes.slice(),     // pour réédition future
    montant_liquide_ht: C.montant_liquide_ht,
    montant_tva: C.montant_tva,
    montant_consigne_brute: C.montant_consigne_brute,
    montant_consigne_btl_brute: C.montant_consigne_btl_brute,
    montant_consigne_casier_brute: C.montant_consigne_casier_brute,
    casiers_rapportes: C.casiers_rapportes,
    btl_rapportees: C.btl_rapportees,
    montant_retour_btl: C.montant_retour_btl,
    montant_retour_casier: C.montant_retour_casier,
    montant_retour_immediat: C.montant_retour_immediat,
    montant_consigne_nette: C.montant_consigne_nette,
    montant_ttc: ttc,
    // alias legacy pour compatibilité ristournes / KPI :
    montant_ht: C.montant_liquide_ht,
    montant_consigne: C.montant_consigne_nette,
    reste_a_payer: ttc - pmt,
    statut: pmt>=ttc?"Payée":(pmt>0?"Partielle":"Impayée"),
    fne_certifie: STATE.config.fne.active,
    fne_code: STATE.config.fne.active ? "FNE"+Math.floor(Math.random()*900000+100000) : null,
  };
  STATE.factures.push(fac);

  // Mouvement stock : seul le liquide sort. Empties restent côté client (consignation).
  _facLignes.forEach(l=>{
    const a = getArticle(l.article_id);
    const qty_total = (l.casiers||0)*a.btl_par_casier + (l.btl||0);
    STATE.mouvements.push({id:uid("mv_"),date:dt,type:"vente",article_id:a.id,
      qte_liquide:-qty_total, qte_btl:0, qte_casier:0,
      ref:"Facture "+numero});
  });
  // Si retour immédiat → les empties entrent dans notre stock
  if(rc>0 || rb>0){
    const firstRec = _facLignes.find(l=>{ const a=getArticle(l.article_id); return a?.type_emballage==="recuperable"; });
    if(firstRec){
      STATE.mouvements.push({id:uid("mv_"),date:dt,type:"retour_emballage",article_id:firstRec.article_id,
        qte_liquide:0, qte_btl:C.btl_rapportees, qte_casier:C.casiers_rapportes,
        ref:"Retour à la livraison — Facture "+numero});
    }
  }

  // Consignations actives : une par produit récupérable, montant net après retour immédiat alloué
  let remainingRetourC = C.casiers_rapportes;
  let remainingRetourB = C.btl_rapportees;
  _facLignes.forEach(cl=>{
    const a = getArticle(cl.article_id);
    if(a.type_emballage!=="recuperable") return;
    const qty_btl_total = cl.casiers*a.btl_par_casier + cl.btl;
    // allocation FIFO du retour à cette consignation
    const allocC = Math.min(cl.casiers, remainingRetourC);
    const allocB = Math.min(qty_btl_total, remainingRetourB);
    remainingRetourC -= allocC;
    remainingRetourB -= allocB;
    const qteC_restant = cl.casiers - allocC;
    const qteB_restant = qty_btl_total - allocB;
    const valeur_restante = qteC_restant * a.consigne_casier + qteB_restant * a.consigne_btl;
    if(qteC_restant>0 || qteB_restant>0){
      STATE.consignations.push({
        id:uid("cs_"), date_sortie:dt, client_id, facture_id:facId,
        article_id:a.id,
        qte_casiers_initiale: cl.casiers, qte_btl_initiale: qty_btl_total,
        qte_casiers: qteC_restant, qte_btl: qteB_restant,
        valeur_initiale: cl.casiers*a.consigne_casier + qty_btl_total*a.consigne_btl,
        valeur: valeur_restante,
        statut:"active",
      });
    }
  });

  // Encaissement initial éventuel
  if(pmt>0 && pm){
    STATE.encaissements.push({
      id:uid("en_"), date:dt, client_id, facture_id:facId,
      mode:pm, montant:pmt, reference:$("#m_ref").value.trim()||""
    });
  }
  saveState(); closeModal();
  route("factures");
  setTimeout(()=>openModal("detailFacture", facId), 200);
  toast("Facture "+numero+" émise"+(C.montant_consigne_nette>0?" — Consignation "+fmtFCFA(C.montant_consigne_nette):""), "success");
}

function saveEncaissement(){

  STATE.encaissements.push({
    id:uid("en_"), date:new Date($("#m_dt").value).toISOString(),

}

    `<button class="btn ghost" onclick="closeModal()">Annuler</button>
     <button class="btn alert" onclick="saveRetourEmballage()">♻️ Enregistrer retour</button>`);

function onCsChange(){
  const id = $("#m_cs").value;
  const c = STATE.consignations.find(x=>x.id===id);
  if(c){
    const cl = getClient(c.client_id); const a = getArticle(c.article_id);
    $("#cs_info").innerHTML = `<div class="f13"><strong>${escapeHtml(cl?.nom)}</strong> · ${escapeHtml(a?.nom)}</div>
      <div class="f13">Sortie ${fmtDate(c.date_sortie)} (${daysBetween(c.date_sortie)}j) · Attendu : ${c.qte_casiers} casiers + ${c.qte_btl} btl</div>
      <div class="f13 b700 warn">Valeur exposée : ${fmtFCFA(c.valeur)}</div>`;
    $("#m_rc").value = c.qte_casiers;
    $("#m_rb").value = c.qte_btl;
  }
}
function saveRetourEmballage(){
  const id = $("#m_cs").value;
  const c = STATE.consignations.find(x=>x.id===id);
  if(!c){ toast("Choisissez une consignation","error"); return; }
  const rc = parseInt($("#m_rc").value)||0;
  const rb = parseInt($("#m_rb").value)||0;
  const a = getArticle(c.article_id);
  STATE.mouvements.push({id:uid("mv_"),date:now(),type:"retour_emballage",article_id:a.id,
    qte_liquide:0, qte_btl:rb, qte_casier:rc,
    ref:`Retour emballage ${getClient(c.client_id)?.nom||""}`});
  // Solde la consignation si retour complet ou partiel suffisant
  if(rc>=c.qte_casiers && rb>=c.qte_btl){
    c.statut = "soldée";
    c.date_retour = now();
  } else {
    // partiel : on réduit
    c.qte_casiers = Math.max(0, c.qte_casiers - rc);
    c.qte_btl = Math.max(0, c.qte_btl - rb);
    c.valeur = c.qte_casiers*a.consigne_casier + c.qte_btl*a.consigne_btl;
    if(c.qte_casiers===0 && c.qte_btl===0) c.statut="soldée";
  }
  saveState(); closeModal(); route(CURRENT_VIEW); toast("Retour enregistré","success");
}
window.signalerPerte = function(id){
  if(!confirm("Signaler ces emballages comme PERDUS ? Cette action soldera la consignation comme une perte.")) return;
  const c = STATE.consignations.find(x=>x.id===id);
  if(!c) return;
  c.statut = "perdue";
  c.date_perte = now();
  STATE.pertes.push({id:uid("pt_"), date:now(), consignation_id:id, client_id:c.client_id,
    article_id:c.article_id, qte_casiers:c.qte_casiers, qte_btl:c.qte_btl, valeur:c.valeur});
  STATE.mouvements.push({id:uid("mv_"),date:now(),type:"perte",article_id:c.article_id,
    qte_liquide:0, qte_btl:-c.qte_btl, qte_casier:-c.qte_casiers,
    ref:`Perte emballage ${getClient(c.client_id)?.nom||""}`});
  saveState(); route(CURRENT_VIEW); toast("Perte enregistrée","warn");
};

function exportData(){

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `sanix_distripro_export_${today()}.json`; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast("Export JSON téléchargé","success");
}
function exportCSV(){
  const rows = [["Numero","Date","Client","NIF","Montant HT","TVA","Consignation","TTC","Statut","Reste"]];
  STATE.factures.forEach(f=>{
    const c = getClient(f.client_id);
    rows.push([f.numero, fmtDate(f.date), c?.nom||"", c?.nif||"",
      f.montant_ht, f.montant_tva, f.montant_consigne, f.montant_ttc, f.statut, f.reste_a_payer]);
  });
  const csv = rows.map(r=>r.map(v=>`"${String(v||"").replace(/"/g,'""')}"`).join(";")).join("\n");
  const blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download=`factures_${today()}.csv`; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast("Export CSV téléchargé","success");
}
function importData(ev){
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = e=>{
    try{
      const data = JSON.parse(e.target.result);
      if(!data.articles || !data.factures){ toast("Fichier invalide","error"); return; }
      if(!confirm("Remplacer les données actuelles par l'import ?")) return;
      STATE = data; saveState(); route("dashboard"); fillContextSelector(); toast("Données importées","success");
    } catch(err){ toast("Erreur de lecture : "+err.message,"error"); }
  };
  r.readAsText(f);
}
function generateTourneesDemo(){
  ensureBadgeCodes();
  const {cl, arts} = STATE._seedExtras;
  if(!STATE.factures.length) return;

  // Helper : crée une "vente historique payée" complète (facture + mouvements + consigne + encaissement)
  function _histoSale(date, clientId, compactLignes, retC, retB, payMode){
    const C = computeFactureFromCompact(compactLignes, retC, retB);
    const numero = "FNE-" + (2026000 + STATE.factures.length + 1);
    const facId = uid("fc_");
    const fac = {
      id: facId, numero, date, client_id: clientId, depot_id: STATE.config.contexte_depot_id,
      lignes: C.lignes, compact_lignes: compactLignes,
      montant_liquide_ht: C.montant_liquide_ht, montant_tva: C.montant_tva,
      montant_consigne_brute: C.montant_consigne_brute,
      montant_consigne_btl_brute: C.montant_consigne_btl_brute,
      montant_consigne_casier_brute: C.montant_consigne_casier_brute,
      casiers_rapportes: C.casiers_rapportes, btl_rapportees: C.btl_rapportees,
      montant_retour_btl: C.montant_retour_btl, montant_retour_casier: C.montant_retour_casier,
      montant_retour_immediat: C.montant_retour_immediat,
      montant_consigne_nette: C.montant_consigne_nette,
      montant_ttc: C.montant_ttc, montant_ht: C.montant_liquide_ht,
      montant_consigne: C.montant_consigne_nette,
      reste_a_payer: 0, statut: "Payée",
      fne_certifie: true, fne_code: "FNE" + Math.floor(Math.random()*900000+100000),
    };
    STATE.factures.push(fac);
    compactLignes.forEach(l=>{
      const a = getArticle(l.article_id);
      const qty_total = l.casiers*a.btl_par_casier + l.btl;
      STATE.mouvements.push({id:uid("mv_"),date,type:"vente",article_id:a.id,
        qte_liquide:-qty_total,qte_btl:0,qte_casier:0,ref:"Facture "+numero});
    });
    if(retC>0||retB>0){
      const firstRec = compactLignes.find(l=>{const a=getArticle(l.article_id);return a?.type_emballage==="recuperable";});
      if(firstRec) STATE.mouvements.push({id:uid("mv_"),date,type:"retour_emballage",article_id:firstRec.article_id,
        qte_liquide:0,qte_btl:C.btl_rapportees,qte_casier:C.casiers_rapportes,ref:"Retour livraison "+numero});
    }
    let remC=C.casiers_rapportes, remB=C.btl_rapportees;
    compactLignes.forEach(cl2=>{
      const a = getArticle(cl2.article_id);
      if(a.type_emballage!=="recuperable") return;
      const qty_btl_total = cl2.casiers*a.btl_par_casier + cl2.btl;
      const allocC=Math.min(cl2.casiers,remC); remC-=allocC;
      const allocB=Math.min(qty_btl_total,remB); remB-=allocB;
      const qteC_rest=cl2.casiers-allocC, qteB_rest=qty_btl_total-allocB;
      if(qteC_rest>0||qteB_rest>0){
        STATE.consignations.push({
          id:uid("cs_"),date_sortie:date,client_id:clientId,facture_id:facId,article_id:a.id,
          qte_casiers_initiale:cl2.casiers, qte_btl_initiale:qty_btl_total,
          qte_casiers:qteC_rest, qte_btl:qteB_rest,
          valeur_initiale:cl2.casiers*a.consigne_casier+qty_btl_total*a.consigne_btl,
          valeur:qteC_rest*a.consigne_casier+qteB_rest*a.consigne_btl, statut:"active"
        });
      }
    });
    STATE.encaissements.push({id:uid("en_"),date,client_id:clientId,facture_id:facId,
      mode:payMode, montant:fac.montant_ttc,
      reference: payMode==="Espèces" ? "" : payMode.replace(/[ é]/g,"")+"-"+Math.floor(Math.random()*900000+100000)});
    return fac;
  }

  // Helper : crée juste une facture impayée (absent — pas de mouvements, juste facturée et reportée)
  function _absentSale(date, clientId, compactLignes){
    const C = computeFactureFromCompact(compactLignes, 0, 0);
    const numero = "FNE-"+(2026000+STATE.factures.length+1);
    const facId = uid("fc_");
    const fac = { id:facId, numero, date, client_id:clientId, depot_id:STATE.config.contexte_depot_id,
      lignes:C.lignes, compact_lignes:compactLignes,
      montant_liquide_ht:C.montant_liquide_ht, montant_tva:C.montant_tva,
      montant_consigne_brute:C.montant_consigne_brute, montant_consigne_btl_brute:C.montant_consigne_btl_brute,
      montant_consigne_casier_brute:C.montant_consigne_casier_brute,
      casiers_rapportes:0, btl_rapportees:0,
      montant_retour_btl:0, montant_retour_casier:0, montant_retour_immediat:0,
      montant_consigne_nette:C.montant_consigne_nette,
      montant_ttc:C.montant_ttc, montant_ht:C.montant_liquide_ht, montant_consigne:C.montant_consigne_nette,
      reste_a_payer:C.montant_ttc, statut:"Impayée",
      fne_certifie:true, fne_code:"FNE"+Math.floor(Math.random()*900000+100000) };
    STATE.factures.push(fac);
    return fac;
  }

  // ========== TOURNÉE J-2 : Issa Traoré, Tricycle, Yopougon + Treichville — RÉCONCILIÉE ==========
  const j2 = new Date(Date.now()-2*86400000);
  const j2d  = j2.toISOString();
  const j2dep = new Date(j2.getTime()+8*3600000).toISOString();
  const j2ret = new Date(j2.getTime()+15*3600000).toISOString();
  const j2rec = new Date(j2.getTime()+16*3600000).toISOString();
  const livs_j2 = [];
  const sales_j2 = [
    {client:cl.buv1.id, lignes:[{article_id:arts.flag.id,casiers:1,btl:0}], retC:1, retB:12, mode:"Wave"},
    {client:cl.buv2.id, lignes:[{article_id:arts.castel.id,casiers:3,btl:0}], retC:3, retB:36, mode:"Espèces"},
    {client:cl.bar1.id, lignes:[{article_id:arts.castel.id,casiers:1,btl:6}], retC:1, retB:18, mode:"Espèces"},
    {client:cl.sup1.id, lignes:[{article_id:arts.coca.id,casiers:2,btl:0}], retC:2, retB:24, mode:"Wave"},
  ];
  sales_j2.forEach((s,i)=>{
    const fac = _histoSale(j2dep, s.client, s.lignes, s.retC, s.retB, s.mode);
    livs_j2.push({id:uid("lv_"), ordre:i+1, client_id:s.client, facture_id:fac.id, statut:"livre",
      date_livraison: new Date(j2.getTime()+(9+i)*3600000).toISOString(),
      vides_rapportes_casiers: s.retC, vides_rapportes_btl: s.retB,
      encaissement_mode: s.mode, encaissement_montant: fac.montant_ttc,
      encaissement_ref: s.mode==="Espèces"?"":"Tx-"+Math.floor(Math.random()*900000+100000)});
  });
  const cash_j2 = livs_j2.filter(l=>l.encaissement_mode==="Espèces").reduce((s,l)=>s+l.encaissement_montant,0);
  const vc_j2 = livs_j2.reduce((s,l)=>s+(l.vides_rapportes_casiers||0),0);
  const vb_j2 = livs_j2.reduce((s,l)=>s+(l.vides_rapportes_btl||0),0);
  STATE.tournees.push({
    id: uid("trn_"), numero: "TRN-"+j2d.slice(0,10).replace(/-/g,"")+"-01",
    date: j2d, livreur_nom:"Issa Traoré", vehicule:"Tricycle", zone:"Yopougon + Treichville",
    depot_id: STATE.config.contexte_depot_id, statut:"reconciliee", livraisons: livs_j2,
    cash_compte:cash_j2, ecart_cash:0,
    vides_comptes_casiers:vc_j2, vides_comptes_btl:vb_j2,
    date_creation:j2d, date_depart:j2dep, date_retour:j2ret, date_reconciliation:j2rec,
    note_reconciliation:"Bonne tournée — aucun écart caisse, vides conformes"
  });

  // ========== TOURNÉE J-1 : Aboubacar Konaté, Pick-up, Cocody + Marcory — RÉCONCILIÉE (1 absent) ==========
  const j1 = new Date(Date.now()-86400000);
  const j1d = j1.toISOString();
  const j1dep = new Date(j1.getTime()+8*3600000).toISOString();
  const j1ret = new Date(j1.getTime()+16*3600000).toISOString();
  const j1rec = new Date(j1.getTime()+17*3600000).toISOString();
  const livs_j1 = [];
  const sales_j1 = [
    {client:cl.hot1.id, lignes:[{article_id:arts.fanta.id,casiers:2,btl:0},{article_id:arts.heine.id,casiers:1,btl:0}], retC:2, retB:24, mode:"Wave", abs:false},
    {client:cl.rst1.id, lignes:[{article_id:arts.vinr.id,casiers:0,btl:6},{article_id:arts.corona.id,casiers:1,btl:0}], retC:0, retB:0, mode:"Wave", abs:false},
    {client:cl.buv3.id, lignes:[{article_id:arts.flag.id,casiers:2,btl:0}], retC:2, retB:24, mode:"Espèces", abs:false},
    {client:cl.buv2.id, lignes:[{article_id:arts.malt.id,casiers:1,btl:0}], retC:0, retB:0, mode:null, abs:true}, // ABSENT
  ];
  sales_j1.forEach((s,i)=>{
    if(s.abs){
      const fac = _absentSale(j1d, s.client, s.lignes);
      livs_j1.push({id:uid("lv_"), ordre:i+1, client_id:s.client, facture_id:fac.id, statut:"absent",
        date_livraison: new Date(j1.getTime()+(10+i)*3600000).toISOString(),
        note:"Client absent — reporté à la prochaine tournée"});
    } else {
      const fac = _histoSale(j1dep, s.client, s.lignes, s.retC, s.retB, s.mode);
      livs_j1.push({id:uid("lv_"), ordre:i+1, client_id:s.client, facture_id:fac.id, statut:"livre",
        date_livraison: new Date(j1.getTime()+(10+i)*3600000).toISOString(),
        vides_rapportes_casiers: s.retC, vides_rapportes_btl: s.retB,
        encaissement_mode: s.mode, encaissement_montant: fac.montant_ttc,
        encaissement_ref: s.mode==="Espèces"?"":"Tx-"+Math.floor(Math.random()*900000+100000)});
    }
  });
  const cash_j1 = livs_j1.filter(l=>l.encaissement_mode==="Espèces").reduce((s,l)=>s+(l.encaissement_montant||0),0);
  const vc_j1 = livs_j1.reduce((s,l)=>s+(l.vides_rapportes_casiers||0),0);
  const vb_j1 = livs_j1.reduce((s,l)=>s+(l.vides_rapportes_btl||0),0);
  STATE.tournees.push({
    id: uid("trn_"), numero: "TRN-"+j1d.slice(0,10).replace(/-/g,"")+"-01",
    date: j1d, livreur_nom:"Aboubacar Konaté", vehicule:"Pick-up", zone:"Cocody + Marcory",
    depot_id: STATE.config.contexte_depot_id, statut:"reconciliee", livraisons:livs_j1,
    cash_compte:cash_j1 + 500, ecart_cash:500,
    vides_comptes_casiers:vc_j1, vides_comptes_btl:vb_j1,
    date_creation:j1d, date_depart:j1dep, date_retour:j1ret, date_reconciliation:j1rec,

/* ====================================================================
   ============ MODULE RISTOURNES ============
   Gère 4 types de ristournes (volume, objectif, escompte, nature),
   dans les 2 directions (reçues / accordées), avec modes d'application
   flexibles (avoir facture, avoir compte, virement séparé).
   ==================================================================== */

// Retourne les transactions d'une période pour un contrat donné
function transactionsContrat(contrat, dateDebut, dateFin){
  const inRange = d => { const dt=new Date(d); return dt>=dateDebut && dt<dateFin; };
  if(contrat.partenaire_type==="concessionnaire"){
    return STATE.achats.filter(a=>a.source_id===contrat.partenaire_id && a.source_type==="concessionnaire" && inRange(a.date));
  } else if(contrat.partenaire_type==="depot" || contrat.partenaire_type==="sous-depot"){
    return STATE.transferts.filter(t=>t.depot_dest_id===contrat.partenaire_id && inRange(t.date));
  } else if(contrat.partenaire_type==="client"){
    return STATE.factures.filter(f=>f.client_id===contrat.partenaire_id && inRange(f.date));
  }
  return [];
}

// Calcule la base (CA HT ou nombre de casiers) d'une liste de transactions
function calculerBase(transactions, base, contratType){
  let totalCasiers = 0, totalCAht = 0;
  transactions.forEach(t=>{
    if(contratType==="concessionnaire" || contratType==="depot" || contratType==="sous-depot"){
      // achats ou transferts
      (t.lignes||[]).forEach(l=>{
        totalCasiers += (l.casiers||0);
        totalCAht += (l.casiers||0)*(l.prix||0) + (l.btl||0)*Math.round((l.prix||0)/12);
      });
    } else {
      // factures (clients finals) : utilise HT (hors consigne)
      totalCAht += (t.montant_ht||0);
      (t.lignes||[]).forEach(l=> totalCasiers += (l.casiers||0));
    }
  });
  return base==="casiers" ? totalCasiers : totalCAht;
}

// Calcule la ristourne acquise pour un contrat sur une période donnée
function calculerRistourneContrat(contrat, periodeDebut, periodeFin){
  const txs = transactionsContrat(contrat, periodeDebut, periodeFin);
  const detail = { volume:0, objectif:0, escompte:0, nature:{casiers:0, valeur:0}, base_casiers:0, base_ca:0, transactions:txs.length, total:0 };
  if(txs.length===0) return detail;

  detail.base_casiers = calculerBase(txs, "casiers", contrat.partenaire_type);
  detail.base_ca      = calculerBase(txs, "ca_ht",   contrat.partenaire_type);

  // 1. Ristourne VOLUME par palier
  if(contrat.regles.volume?.actif){
    const r = contrat.regles.volume;
    const base = r.base==="casiers" ? detail.base_casiers : detail.base_ca;
    r.paliers.forEach(p=>{
      const min = p.seuil_min, max = p.seuil_max===null ? Infinity : p.seuil_max;
      if(base > min){
        const portion = Math.min(base, max) - min;
        // taux est en % (ex : 1.5 = 1,5%)
        const gain = r.base==="casiers" ? portion * p.taux : portion * p.taux / 100;
        detail.volume += gain;
      }
    });
    // si base=casiers, p.taux est interprété comme F/casier directement
    // sinon (ca_ht), p.taux est en %
  }

  // 2. Ristourne OBJECTIF (forfait si objectif atteint)
  if(contrat.regles.objectif?.actif){
    const r = contrat.regles.objectif;
    const base = r.base==="casiers" ? detail.base_casiers : detail.base_ca;
    if(base >= r.objectif) detail.objectif = r.bonus;
  }

  // 3. Ristourne ESCOMPTE (paiement comptant : seules les transactions payées dans le délai)
  if(contrat.regles.escompte?.actif){
    const r = contrat.regles.escompte;
    txs.forEach(tx=>{
      // pour achats : pas d'historique de paiement détaillé, on suppose comptant par défaut
      // pour factures : on vérifie la date du premier encaissement
      if(contrat.partenaire_type==="client"){
        const enc = STATE.encaissements.filter(e=>e.facture_id===tx.id).sort((a,b)=>new Date(a.date)-new Date(b.date));
        if(enc.length>0 && tx.statut==="Payée"){
          const delaiJours = daysBetween(tx.date, enc[enc.length-1].date);
          if(delaiJours <= r.delai_jours){
            detail.escompte += (tx.montant_ht||0) * r.taux / 100;
          }
        }
      } else {
        // achat ou transfert : on prend la totalité (paiement supposé comptant)
        const baseHT = (tx.lignes||[]).reduce((s,l)=>s + (l.casiers||0)*(l.prix||0) + (l.btl||0)*Math.round((l.prix||0)/12), 0);
        detail.escompte += baseHT * r.taux / 100;
      }
    });
  }

  // 4. Ristourne NATURE (bonus en casiers : 1 offert tous les X)
  if(contrat.regles.nature?.actif){
    const r = contrat.regles.nature;
    if(detail.base_casiers >= r.seuil_casiers && r.seuil_casiers>0){
      const blocs = Math.floor(detail.base_casiers / r.seuil_casiers);
      detail.nature.casiers = blocs * r.casiers_offerts;
      // valeur monétaire approximative : prix moyen casier sur la période
      const prixMoyen = detail.base_ca > 0 && detail.base_casiers>0 ? detail.base_ca / detail.base_casiers : 6000;
      detail.nature.valeur = detail.nature.casiers * prixMoyen;
    }
  }

  detail.total = Math.round(detail.volume + detail.objectif + detail.escompte + detail.nature.valeur);
  return detail;
}

// Période courante selon le type de calcul
function periodeCourante(typePeriode, ref=new Date()){
  const d = new Date(ref);
  let debut, fin;
  if(typePeriode==="mensuelle"){
    debut = new Date(d.getFullYear(), d.getMonth(), 1);
    fin   = new Date(d.getFullYear(), d.getMonth()+1, 1);
  } else if(typePeriode==="trimestrielle"){
    const q = Math.floor(d.getMonth()/3);
    debut = new Date(d.getFullYear(), q*3, 1);
    fin   = new Date(d.getFullYear(), q*3+3, 1);
  } else { // annuelle
    debut = new Date(d.getFullYear(), 0, 1);
    fin   = new Date(d.getFullYear()+1, 0, 1);
  }
  return {debut, fin, label: typePeriode==="mensuelle"
    ? debut.toLocaleDateString("fr-FR",{month:"long",year:"numeric"})
    : typePeriode==="trimestrielle"
    ? `T${Math.floor(debut.getMonth()/3)+1} ${debut.getFullYear()}`
    : `Année ${debut.getFullYear()}` };
}

// Période précédente
function periodePrecedente(typePeriode, ref=new Date()){
  const d = new Date(ref);
  if(typePeriode==="mensuelle") d.setMonth(d.getMonth()-1);
  else if(typePeriode==="trimestrielle") d.setMonth(d.getMonth()-3);
  else d.setFullYear(d.getFullYear()-1);
  return periodeCourante(typePeriode, d);
}

// Recalcule TOUTES les ristournes (période courante + précédente non appliquée)
function recalculerToutesRistournes(){
  // Conserve les ristournes déjà appliquées (historique) ; supprime les "acquises" non encore appliquées
  STATE.ristournes_calculs = STATE.ristournes_calculs.filter(c=>c.statut==="appliquee");
  const appliqueesParPeriode = new Set(STATE.ristournes_calculs.map(c=>c.contrat_id+"::"+c.periode_debut));

  STATE.ristournes_contrats.forEach(contrat=>{
    [periodeCourante(contrat.periode_calcul), periodePrecedente(contrat.periode_calcul)].forEach(per=>{
      const key = contrat.id+"::"+per.debut.toISOString().slice(0,10);
      if(appliqueesParPeriode.has(key)) return; // déjà soldée
      const detail = calculerRistourneContrat(contrat, per.debut, per.fin);
      if(detail.total > 0 || detail.nature.casiers > 0){
        STATE.ristournes_calculs.push({
          id:uid("rk_"), contrat_id:contrat.id,
          periode_debut: per.debut.toISOString().slice(0,10),
          periode_fin:   per.fin.toISOString().slice(0,10),
          periode_label: per.label,
          direction: contrat.direction,
          detail,
          montant_total: detail.total,
          statut: "acquise",
          date_acquisition: now(),
        });
      }
    });
  });
  saveState();
}

// Totaux pour KPI dashboard
function ristournesTotaux(){
  const cal = STATE.ristournes_calculs.filter(c=>c.statut==="acquise" || c.statut==="notifiee");
  let recues = 0, accordees = 0, casiersOfferts = 0;
  cal.forEach(c=>{
    if(c.direction==="recue") recues += c.montant_total;
    else accordees += c.montant_total;
    casiersOfferts += (c.detail.nature?.casiers || 0);
  });
  return { recues, accordees, net: recues - accordees, casiersOfferts };
}

// Helpers pour les paliers (gérés via DOM)
let _palierWorking = null;
function readPaliersFromDOM(){
  const box = $("#palierBox"); if(!box) return [];
  const paliers = [];
  const max = box.querySelectorAll("[data-p-min]").length;
  for(let i=0;i<max;i++){
    const min = parseFloat(box.querySelector(`[data-p-min="${i}"]`)?.value)||0;
    const maxV = box.querySelector(`[data-p-max="${i}"]`)?.value;
    const taux = parseFloat(box.querySelector(`[data-p-taux="${i}"]`)?.value)||0;
    paliers.push({seuil_min:min, seuil_max: maxV===""?null:parseFloat(maxV), taux});
  }
  return paliers;
}
function addPalier(){
  const cur = readPaliersFromDOM();
  cur.push({seuil_min: cur.length>0 ? (cur[cur.length-1].seuil_max||0) : 0, seuil_max:null, taux:0});
  renderPaliers(cur);
}
function removePalier(i){
  const cur = readPaliersFromDOM();
  cur.splice(i,1);
  renderPaliers(cur);
}
function renderPaliers(paliers){
  const box = $("#palierBox"); if(!box) return;
  box.innerHTML = paliers.map((p,i)=>`
    <div class="flex" style="gap:6px;margin-bottom:6px">
      <input type="number" data-p-min="${i}" value="${p.seuil_min}" placeholder="Seuil min" style="flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:6px">
      <input type="number" data-p-max="${i}" value="${p.seuil_max===null?'':p.seuil_max}" placeholder="Seuil max (vide=∞)" style="flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:6px">
      <input type="number" step="0.01" data-p-taux="${i}" value="${p.taux}" placeholder="Taux" style="flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:6px">
      <button class="btn sm danger" onclick="removePalier(${i})">×</button>
    </div>`).join("");
}

function saveContratRistourne(id){
  const [ptype, pid] = ($("#rc_part").value||"").split("::");
  if(!ptype || !pid){ toast("Sélectionnez un partenaire","error"); return; }
  const direction = ptype==="concessionnaire" ? "recue" : "accordee";
  const paliers = readPaliersFromDOM();
  const data = {
    partenaire_type: ptype, partenaire_id: pid, direction,
    periode_calcul: $("#rc_per").value,
    mode_application: $("#rc_mode").value,
    date_debut: $("#rc_dd").value,
    date_fin: null,
    regles: {
      volume: { actif: $("#rc_v_act").checked, base: $("#rc_v_base").value, paliers },
      objectif: { actif: $("#rc_o_act").checked,
        objectif: parseFloat($("#rc_o_obj").value)||0,
        base: $("#rc_o_base").value,
        bonus: parseFloat($("#rc_o_bon").value)||0 },
      escompte: { actif: $("#rc_e_act").checked,
        delai_jours: parseInt($("#rc_e_del").value)||0,
        taux: parseFloat($("#rc_e_tx").value)||0 },
      nature: { actif: $("#rc_n_act").checked,

        casiers_offerts: parseInt($("#rc_n_off").value)||0,
        article_offert_id: null }
    },
    notes: $("#rc_notes").value.trim()
  };
  if(id){
    Object.assign(STATE.ristournes_contrats.find(x=>x.id===id), data);
    toast("Contrat modifié","success");
  } else {
    STATE.ristournes_contrats.push({id:uid("rc_"), ...data});

  }
  recalculerToutesRistournes();
  saveState(); closeModal(); route("ristournes");

function appliquerRistourne(calId){
  const cal = STATE.ristournes_calculs.find(x=>x.id===calId);
  if(!cal) return;
  const co = STATE.ristournes_contrats.find(x=>x.id===cal.contrat_id);
  const mt = parseInt($("#app_mt").value)||0;
  if(mt<=0){ toast("Montant invalide","error"); return; }
  const typeApp = $("#app_type").value;
  const facId = typeApp==="deduction_facture" ? $("#app_fac")?.value : null;

  STATE.ristournes_applications.push({
    id:uid("ra_"), calcul_id:calId, date_application:now(),
    type_application: typeApp,
    facture_id: facId || null,
    montant_applique: mt,
    reference: $("#app_ref").value.trim(),
  });

  // Si déduction facture du client (ristourne accordée) → réduit le reste à payer
  if(typeApp==="deduction_facture" && facId){
    const f = STATE.factures.find(x=>x.id===facId);
    if(f){
      f.reste_a_payer = Math.max(0, (f.reste_a_payer||0) - mt);
      f.statut = f.reste_a_payer===0 ? "Payée" : "Partielle";
      STATE.encaissements.push({
        id:uid("en_"), date:now(), client_id:f.client_id, facture_id:f.id,
        mode:"Ristourne", montant:mt, reference:"Ristourne — "+($("#app_ref").value||"")
      });
    }
  }

  // Marquer la ristourne comme appliquée si on a tout consommé
  if(mt >= cal.montant_total){
    cal.statut = "appliquee";
  } else {
    cal.montant_total -= mt;
    // ajuster grossièrement le détail (montant restant)
  }
  saveState(); closeModal(); route("ristournes"); toast("Ristourne appliquée","success");
}

   Badge client + Tournée + Bordereau + Mode livreur + Réconciliation

// Hash deterministe → code badge 6 chars
function hashStr(s){
  let h = 5381;
  for(let i=0;i<s.length;i++) h = ((h<<5)+h + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}
function genCodeBadge(clientId, clientNom){
  // Format : 3 lettres du nom + "-" + 3 chars hex du hash → ex BUV-3F2
  const prefix = (clientNom||"CLI")
    .toUpperCase()
    .replace(/[^A-Z]/g,"")
    .slice(0,3)
    .padEnd(3,"X");
  const h = hashStr(clientId).toString(36).toUpperCase().slice(0,3).padStart(3,"0");
  return prefix + "-" + h;
}

// Identicon : grille 7x7 symétrique colorée basée sur le hash
function genIdenticon(seed, size=80){
  const h = hashStr(seed);
  // Couleur depuis le hash (HSL pour rester lisible)
  const hue = h % 360;
  const sat = 55 + (h>>8)%30;
  const lig = 38 + (h>>16)%15;
  const color = `hsl(${hue},${sat}%,${lig}%)`;
  // Grille 7x7 symétrique (on remplit 4 colonnes à gauche, miroir à droite)
  let cells = [];
  for(let y=0;y<7;y++){
    for(let x=0;x<4;x++){
      const bit = (h >> ((y*4+x)%30)) & 1;
      cells.push({x,y,on:bit});
    }
  }
  const cell = size / 7;
  let rects = "";
  cells.forEach(c=>{
    if(c.on){
      rects += `<rect x="${c.x*cell}" y="${c.y*cell}" width="${cell}" height="${cell}" fill="${color}"/>`;
      // miroir
      if(c.x<3){
        rects += `<rect x="${(6-c.x)*cell}" y="${c.y*cell}" width="${cell}" height="${cell}" fill="${color}"/>`;
      }
    }
  });
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg" style="background:#fff;border-radius:4px;border:1px solid #e3e8ef">${rects}</svg>`;
}

// Assigne un code badge à tout client qui n'en a pas
function ensureBadgeCodes(){
  let modif = false;
  STATE.clients.forEach(c=>{
    if(!c.code_badge){
      c.code_badge = genCodeBadge(c.id, c.nom);
      modif = true;
    }
  });
  // Gère les collisions (rare mais possible)
  const codes = {};
  STATE.clients.forEach(c=>{
    if(codes[c.code_badge]){
      // collision : ajoute un suffixe
      let i=2;
      while(codes[c.code_badge+i]) i++;
      c.code_badge = c.code_badge + i;
      modif = true;
    }
    codes[c.code_badge] = true;
  });
  if(modif) saveState();
}
ensureBadgeCodes();

// Premier lancement : générer les tournées démo (qui dépendent de ensureBadgeCodes)
if(firstLaunch && STATE.tournees.length===0){
  generateTourneesDemo();
  generateRetoursDemo();
  saveState();
}

// Recherche client par code
function findClientByCode(code){
  if(!code) return null;
  const cleaned = code.trim().toUpperCase().replace(/[^A-Z0-9-]/g,"");
  return STATE.clients.find(c=>c.code_badge === cleaned) || null;
}

// Génération d'un n° tournée
function genTourneeNumero(){
  const d = new Date();
  const ymd = d.toISOString().slice(0,10).replace(/-/g,"");
  const seq = STATE.tournees.filter(t=>t.numero?.startsWith("TRN-"+ymd)).length + 1;
  return "TRN-"+ymd+"-"+String(seq).padStart(2,"0");
}

// Calcule les totaux d'une tournée
function tourneeStats(t){
  const prevu_ttc = t.livraisons.reduce((s,l)=>{
    const f = STATE.factures.find(x=>x.id===l.facture_id);
    return s + (f?.montant_ttc || l.montant_prevu || 0);
  }, 0);
  const livres = t.livraisons.filter(l=>l.statut==="livre");
  const encaisse = livres.reduce((s,l)=>s+(l.encaissement_montant||0), 0);
  const vides_c = livres.reduce((s,l)=>s+(l.vides_rapportes_casiers||0), 0);
  const vides_b = livres.reduce((s,l)=>s+(l.vides_rapportes_btl||0), 0);
  return {
    nb_livraisons: t.livraisons.length,
    nb_livrees: livres.length,
    nb_absents: t.livraisons.filter(l=>l.statut==="absent").length,
    nb_pending: t.livraisons.filter(l=>l.statut==="pending"||!l.statut).length,
    prevu_ttc, encaisse, vides_c, vides_b
  };
}

window.mlvSearchCode = function(){
  const code = $("#mlv_code").value.trim().toUpperCase();
  if(!code){ toast("Entrez un code","error"); return; }
  const cl = findClientByCode(code);
  if(!cl){ toast("Code inconnu — vérifiez le badge","error"); return; }
  // Cherche la tournée en cours et la livraison de ce client
  const t = STATE.tournees.find(x=>x.statut==="en_cours");
  if(!t){ toast("Aucune tournée en cours","error"); return; }
  const liv = t.livraisons.find(l=>l.client_id===cl.id && (l.statut==="pending"||!l.statut));
  if(!liv){
    // client n'est pas dans la tournée du jour
    if(confirm(`${cl.nom} n'est pas prévu dans la tournée. Voulez-vous une livraison express ?`)){
      // → on ouvre nouvelle facture pour ce client
      closeModal();
      openModal("nouvelleFacture", cl.id);
    }
    return;
  }
  openModal("effectuerLivraison", t.id+"::"+liv.id);
};

window.confirmerLivraison = function(composite){
  const [tId, lId] = composite.split("::");
  const t = STATE.tournees.find(x=>x.id===tId);
  const l = t.livraisons.find(x=>x.id===lId);
  const fac = STATE.factures.find(x=>x.id===l.facture_id);
  const st = $("#liv_st").value;
  l.statut = st;
  l.date_livraison = now();
  l.note = $("#liv_note").value.trim();
  if(st==="livre" || st==="partiel"){
    const rc = parseInt($("#liv_rc")?.value)||0;
    const rb = parseInt($("#liv_rb")?.value)||0;
    l.vides_rapportes_casiers = rc;
    l.vides_rapportes_btl = rb;
    const pm = $("#liv_pm").value;
    const pmt = parseInt($("#liv_pmt").value)||0;
    if(pm && pmt>0){
      l.encaissement_mode = pm;
      l.encaissement_montant = pmt;
      l.encaissement_ref = $("#liv_ref").value.trim();
      // crée un encaissement réel
      STATE.encaissements.push({
        id:uid("en_"), date:now(), client_id:fac.client_id, facture_id:fac.id,
        mode:pm, montant:pmt, reference:l.encaissement_ref||"Livraison "+t.numero
      });
      fac.reste_a_payer = Math.max(0, fac.reste_a_payer - pmt);
      fac.statut = fac.reste_a_payer===0 ? "Payée" : "Partielle";
    }
    // Allocation FIFO des vides aux consignations de cette facture
    if(rc>0 || rb>0){
      let remC = rc, remB = rb;
      const consActives = STATE.consignations.filter(c=>c.facture_id===fac.id && c.statut==="active");
      consActives.forEach(co=>{
        const a = getArticle(co.article_id);
        const allocC = Math.min(co.qte_casiers, remC); remC -= allocC;
        const allocB = Math.min(co.qte_btl, remB); remB -= allocB;
        co.qte_casiers -= allocC; co.qte_btl -= allocB;
        co.valeur = co.qte_casiers * a.consigne_casier + co.qte_btl * a.consigne_btl;
        if(co.qte_casiers===0 && co.qte_btl===0){ co.statut = "soldée"; co.date_retour = now(); }
      });
      const firstRecLine = fac.lignes.find(ll=>ll.type==='consigne_btl' || ll.type==='consigne_casier');
      if(firstRecLine){
        STATE.mouvements.push({id:uid("mv_"),date:now(),type:"retour_emballage",article_id:firstRecLine.article_id,
          qte_liquide:0, qte_btl:rb, qte_casier:rc, ref:`Retour livraison ${t.numero} — ${fac.numero}`});
      }
    }
  }
  saveState(); closeModal(); route("modeLivreur"); toast(st==="livre"?"Livraison validée ✓":"Livraison enregistrée","success");
};

window.recAjustEcart = function(){
  const t = STATE.tournees.find(x=>x.statut==="terminee" || x.statut==="en_cours");
  if(!t) return;
  const cashAttendu = t.livraisons.filter(l=>l.encaissement_mode==='Espèces').reduce((s,l)=>s+l.encaissement_montant,0);
  const cashCompte = parseInt($("#rec_cash").value)||0;
  const ec = cashCompte - cashAttendu;
  if($("#rec_ecart")){
    $("#rec_ecart").textContent = (ec>0?'+':'') + fmtFCFA(ec);
    $("#rec_ecart").style.color = ec<0 ? 'var(--danger)' : (ec>0 ? 'var(--alert)' : 'var(--primary)');
  }
};
window.validerReconciliation = function(id){
  const t = STATE.tournees.find(x=>x.id===id);
  const cash = parseInt($("#rec_cash").value)||0;
  const cashAttendu = t.livraisons.filter(l=>l.encaissement_mode==='Espèces').reduce((s,l)=>s+l.encaissement_montant,0);
  t.cash_compte = cash;
  t.ecart_cash = cash - cashAttendu;
  t.vides_comptes_casiers = parseInt($("#rec_vc").value)||0;
  t.vides_comptes_btl = parseInt($("#rec_vb").value)||0;
  t.note_reconciliation = $("#rec_note").value.trim();
  t.statut = "reconciliee";
  t.date_reconciliation = now();
  saveState(); closeModal(); route("tourneeDetail", id);
  if(t.ecart_cash<0) toast(`⚠️ Écart caisse négatif : ${fmtFCFA(t.ecart_cash)}`,"warn");
  else toast("Tournée réconciliée ✓","success");
};
