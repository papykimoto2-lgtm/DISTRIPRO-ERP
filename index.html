// Génère un numéro d'avoir AV-2026XXX
function genAvoirNumero(){
  const seq = STATE.retours_marchandise.length + 1;
  return "AV-2026" + String(seq).padStart(3,"0");
}

// Calcule les totaux d'un retour à partir des lignes à retourner
// linesToReturn: [{article_id, casiers_retournes, btl_retournes, consigne_reprise}]
function computeRetour(factureOrigine, linesToReturn){
  const tvaPct = STATE.config.depot.tva || 18;
  let liquide_ht=0, tva=0, consigne_btl=0, consigne_casier=0;
  const lignes_calc = linesToReturn.map(lr=>{
    const a = getArticle(lr.article_id);
    if(!a) return null;
    const qty_btl_total = (lr.casiers_retournes||0) * a.btl_par_casier + (lr.btl_retournes||0);
    const liq_ht = qty_btl_total * a.prix_btl;
    const tva_l  = Math.round(liq_ht * tvaPct / 100);
    const cb     = (lr.consigne_reprise && a.type_emballage==="recuperable") ? qty_btl_total * a.consigne_btl : 0;
    const cc     = (lr.consigne_reprise && a.type_emballage==="recuperable") ? (lr.casiers_retournes||0) * a.consigne_casier : 0;
    liquide_ht += liq_ht;
    tva += tva_l;
    consigne_btl += cb;
    consigne_casier += cc;
    return {
      article_id: a.id,
      casiers_retournes: lr.casiers_retournes||0,
      btl_retournes: lr.btl_retournes||0,
      consigne_reprise: !!lr.consigne_reprise && a.type_emballage==="recuperable",
      qty_btl_total,
      prix_btl: a.prix_btl, prix_casier: a.prix_casier,
      consigne_btl_u: a.consigne_btl, consigne_casier_u: a.consigne_casier,
      btl_par_casier: a.btl_par_casier,
      liquide_ht_credit: liq_ht,
      tva_credit: tva_l,
      consigne_btl_credit: cb,
      consigne_casier_credit: cc,
      total_credit: liq_ht + tva_l + cb + cc,
    };
  }).filter(Boolean);
  return {
    lignes: lignes_calc,
    montant_liquide_ht_total: liquide_ht,
    montant_tva_total: tva,
    montant_consigne_btl_total: consigne_btl,
    montant_consigne_casier_total: consigne_casier,
    montant_consigne_total: consigne_btl + consigne_casier,
    montant_avoir_ttc: liquide_ht + tva + consigne_btl + consigne_casier,
  };
}

// Compute déjà retournés sur une facture (pour plafonner les retours suivants)
function dejaRetourneParArticle(factureId){
  const map = {};
  STATE.retours_marchandise.filter(r=>r.facture_origine_id===factureId).forEach(r=>{
    r.lignes.forEach(l=>{
      if(!map[l.article_id]) map[l.article_id] = {casiers:0, btl:0};
      map[l.article_id].casiers += l.casiers_retournes;
      map[l.article_id].btl += l.btl_retournes;
    });
  });
  return map;
}

// Applique un retour (effectue tous les effets en cascade)
function appliquerRetour(retour){
  const fac = STATE.factures.find(x=>x.id===retour.facture_origine_id);
  if(!fac) return false;
  // 1. Mouvements stock : entrée liquide (les produits reviennent)
  retour.lignes.forEach(l=>{
    STATE.mouvements.push({id:uid("mv_"), date:retour.date, type:"retour_marchandise",
      article_id:l.article_id,
      qte_liquide: l.qty_btl_total, qte_btl: 0, qte_casier: 0,
      ref:`Avoir ${retour.numero} (facture ${fac.numero})`
    });
  });
  // 2. Ajustement facture origine
  fac.montant_liquide_ht = Math.max(0, (fac.montant_liquide_ht||0) - retour.montant_liquide_ht_total);
  fac.montant_tva = Math.max(0, (fac.montant_tva||0) - retour.montant_tva_total);
  fac.montant_consigne_brute = Math.max(0, (fac.montant_consigne_brute||0) - retour.montant_consigne_total);
  fac.montant_consigne_nette = Math.max(0, (fac.montant_consigne_nette||0) - retour.montant_consigne_total);
  fac.montant_consigne_btl_brute = Math.max(0, (fac.montant_consigne_btl_brute||0) - retour.montant_consigne_btl_total);
  fac.montant_consigne_casier_brute = Math.max(0, (fac.montant_consigne_casier_brute||0) - retour.montant_consigne_casier_total);
  fac.montant_ttc = Math.max(0, (fac.montant_ttc||0) - retour.montant_avoir_ttc);
  fac.montant_ht = fac.montant_liquide_ht;
  fac.montant_consigne = fac.montant_consigne_nette;

  // 3. Application selon le mode
  let credit_restant = retour.montant_avoir_ttc;
  if(retour.mode_application === "reduction_facture"){
    const reduction = Math.min(credit_restant, fac.reste_a_payer || 0);
    fac.reste_a_payer = Math.max(0, (fac.reste_a_payer||0) - reduction);
    credit_restant -= reduction;
    retour.reduction_appliquee = reduction;
    fac.statut = fac.reste_a_payer === 0 ? "Payée" : (fac.reste_a_payer < fac.montant_ttc ? "Partielle" : "Impayée");
    // si après réduction le restant à payer est 0 et que la facture est entièrement retournée, marque "Avoir"
    if(fac.montant_ttc === 0) fac.statut = "Avoir";
  } else if(retour.mode_application === "avoir_compte"){
    // L'avoir reste cumulé sur le compte client (non déduit de la facture)
    retour.avoir_disponible = retour.montant_avoir_ttc;
  } else if(retour.mode_application === "remboursement"){
    // On crée un "encaissement négatif" (= sortie de caisse)
    STATE.encaissements.push({
      id:uid("en_"), date:retour.date, client_id:retour.client_id,
      facture_id: fac.id,
      mode: "Remboursement-" + (retour.refund_mode||"Espèces"),
      montant: -retour.refund_montant,
      reference: "Avoir " + retour.numero + (retour.refund_reference ? " · " + retour.refund_reference : "")
    });
  }
  // Recompte le ttc final = ttc d'origine moins l'avoir
  if(fac.montant_ttc <= 0){
    fac.statut = "Avoir";
    fac.reste_a_payer = 0;
  }

  // 4. Consignations actives — solder/réduire si consigne_reprise=true
  retour.lignes.forEach(l=>{
    if(!l.consigne_reprise) return;
    const cons = STATE.consignations.filter(c=>c.facture_id===fac.id && c.article_id===l.article_id && c.statut==="active");
    let remC = l.casiers_retournes, remB = l.qty_btl_total;
    cons.forEach(co=>{
      const allocC = Math.min(co.qte_casiers, remC); remC -= allocC;
      const allocB = Math.min(co.qte_btl, remB); remB -= allocB;
      co.qte_casiers -= allocC;
      co.qte_btl -= allocB;
      co.valeur = co.qte_casiers * l.consigne_casier_u + co.qte_btl * l.consigne_btl_u;
      if(co.qte_casiers === 0 && co.qte_btl === 0){
        co.statut = "soldée";
        co.date_retour = retour.date;
        co.solde_par = "Retour marchandise " + retour.numero;
      }
    });
  });

  // 5. Si réaffectation : créer la facture pour client B
  if(retour.destination === "reaffectation" && retour.destination_client_id){
    const compactLignes = retour.lignes.map(l=>({
      article_id: l.article_id,
      casiers: l.casiers_retournes,
      btl: l.btl_retournes
    }));
    const C = computeFactureFromCompact(compactLignes, 0, 0); // pas de retour à la livraison sur réaffectation
    const numero = "FNE-" + (2026000 + STATE.factures.length + 1);
    const newFacId = uid("fc_");
    const newFac = {
      id: newFacId, numero, date: retour.date,
      client_id: retour.destination_client_id,
      depot_id: STATE.config.contexte_depot_id,
      lignes: C.lignes, compact_lignes: compactLignes,
      montant_liquide_ht: C.montant_liquide_ht,
      montant_tva: C.montant_tva,
      montant_consigne_brute: C.montant_consigne_brute,
      montant_consigne_btl_brute: C.montant_consigne_btl_brute,
      montant_consigne_casier_brute: C.montant_consigne_casier_brute,
      casiers_rapportes: 0, btl_rapportees: 0,
      montant_retour_btl: 0, montant_retour_casier: 0,
      montant_retour_immediat: 0,
      montant_consigne_nette: C.montant_consigne_nette,
      montant_ttc: C.montant_ttc,
      montant_ht: C.montant_liquide_ht,
      montant_consigne: C.montant_consigne_nette,
      reste_a_payer: C.montant_ttc,
      statut: "Impayée",
      fne_certifie: STATE.config.fne.active,
      fne_code: STATE.config.fne.active ? "FNE" + Math.floor(Math.random()*900000+100000) : null,
      reaffectation_depuis_retour: retour.id,
    };
    STATE.factures.push(newFac);
    retour.destination_facture_id = newFacId;
    // Sortie liquide (la marchandise est immédiatement re-vendue)
    compactLignes.forEach(l=>{
      const a = getArticle(l.article_id);
      const qty_total = l.casiers*a.btl_par_casier + l.btl;
      STATE.mouvements.push({id:uid("mv_"),date:retour.date,type:"vente",article_id:a.id,
        qte_liquide:-qty_total, qte_btl:0, qte_casier:0,
        ref:"Réaffectation depuis avoir "+retour.numero+" — Facture "+numero});
    });
    // Consignations pour client B
    compactLignes.forEach(cl=>{
      const a = getArticle(cl.article_id);
      if(a.type_emballage!=="recuperable") return;
      const qty_btl_total = cl.casiers*a.btl_par_casier + cl.btl;
      STATE.consignations.push({
        id:uid("cs_"), date_sortie:retour.date, client_id:retour.destination_client_id, facture_id:newFacId,
        article_id:a.id,
        qte_casiers_initiale:cl.casiers, qte_btl_initiale:qty_btl_total,
        qte_casiers:cl.casiers, qte_btl:qty_btl_total,
        valeur_initiale: cl.casiers*a.consigne_casier + qty_btl_total*a.consigne_btl,
        valeur: cl.casiers*a.consigne_casier + qty_btl_total*a.consigne_btl,
        statut:"active"
      });
    });
  }

  // 6. Recalcul ristournes (CA HT a changé)
  if(typeof recalculerToutesRistournes === "function") recalculerToutesRistournes();

  retour.statut = "cloture";
  return true;
}

window.setRetourLine = function(articleId, field, value){
  if(!_retourLignes[articleId]) _retourLignes[articleId] = {casiers:0, btl:0, consigne_reprise:true};
  if(field==="casiers" || field==="btl"){
    _retourLignes[articleId][field] = parseInt(value)||0;
  } else if(field==="consigne_reprise"){
    _retourLignes[articleId].consigne_reprise = !!value;
  }
  if(field==="consigne_reprise") renderRetourLignes(); // refresh hint
  recomputeRetour();
};

function recomputeRetour(){
  if(!_retourFacture){
    if($("#ret_lh")){$("#ret_lh").textContent="0 F";$("#ret_tva").textContent="0 F";$("#ret_cons").textContent="0 F";$("#ret_ttc").textContent="− 0 F";}
    return;
  }
  const linesToReturn = Object.entries(_retourLignes).map(([article_id, v])=>({
    article_id, casiers_retournes:v.casiers, btl_retournes:v.btl, consigne_reprise:v.consigne_reprise
  })).filter(l=>l.casiers_retournes>0 || l.btl_retournes>0);
  if(linesToReturn.length===0){
    if($("#ret_lh")){$("#ret_lh").textContent="0 F";$("#ret_tva").textContent="0 F";$("#ret_cons").textContent="0 F";$("#ret_ttc").textContent="− 0 F";}
    return;
  }
  const C = computeRetour(_retourFacture, linesToReturn);
  if($("#ret_lh")) $("#ret_lh").textContent = fmtFCFA(C.montant_liquide_ht_total);
  if($("#ret_tva")) $("#ret_tva").textContent = fmtFCFA(C.montant_tva_total);
  if($("#ret_cons")) $("#ret_cons").textContent = fmtFCFA(C.montant_consigne_total);

}

// Charge la lib Supabase à la demande (CDN)
async function loadSupabaseLib(){
  if(window.supabase && window.supabase.createClient) return true;
  if(_supaLoading) return new Promise(r=>setTimeout(()=>r(loadSupabaseLib()), 100));
  _supaLoading = true;
  return new Promise((resolve)=>{
    const s = document.createElement('script');
    s.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js";
    s.onload = () => { _supaLoading = false; resolve(true); };
    s.onerror = () => { _supaLoading = false; resolve(false); };
    document.head.appendChild(s);
  });
}

// Obtient (ou crée) le client Supabase
async function ensureSupabase(){
  if(_supaClient) return _supaClient;
  const loaded = await loadSupabaseLib();
  if(!loaded){
    toast("Lib Supabase non chargée — vérifiez la connexion internet","error");
    return null;
  }
  try{
    _supaClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
        storageKey: 'sb-' + SUPABASE_PROJECT_REF + '-auth-token'
      }
    });
    _supaClient.auth.onAuthStateChange(async (event, session)=>{
      _authUser = session ? session.user : null;
      _authRole = null;
      if(_authUser){
        try{
          const { data } = await _supaClient.from('profiles').select('role,full_name').eq('id', _authUser.id).maybeSingle();
          _authRole = data?.role || 'manager';
          _authUser._profile_name = data?.full_name;
        }catch(e){ _authRole = 'manager'; }
        if(event === 'SIGNED_IN'){
          _supaClient.from('profiles').update({
            derniere_connexion: new Date().toISOString(),
            device_id_last: getDeviceId()
          }).eq('id', _authUser.id).then(()=>{});
        }
      }
      updateSyncUI();
      updateSyncBadge();
    });
    const { data } = await _supaClient.auth.getSession();
    if(data?.session){
      _authUser = data.session.user;
      try{
        const { data: p } = await _supaClient.from('profiles').select('role,full_name').eq('id', _authUser.id).maybeSingle();
        _authRole = p?.role || 'manager';
        _authUser._profile_name = p?.full_name;
      }catch(e){ _authRole = 'manager'; }
      updateSyncBadge();
    }
    return _supaClient;
  }catch(e){
    toast("Erreur création client Supabase : "+e.message,"error");
    return null;
  }
}

async function requireAuth(callback){
  const sb = await ensureSupabase();
  if(!sb) return null;
  if(_authUser) return sb;
  _pendingAfterAuth = callback;
  openModal('auth');
  return null;
}

// Vérifie si le rôle courant peut écrire
function canWrite(){ return _authRole && ['admin','manager','livreur'].includes(_authRole); }
function canManage(){ return _authRole && ['admin','manager'].includes(_authRole); }

// Récupère la version courante du cloud (pour détecter les conflits)
async function getCloudVersion(){
  const sb = _supaClient || await ensureSupabase();
  if(!sb) return null;
  try{
    const { data, error } = await sb.from('app_state').select('version,device_id,updated_at,size_bytes').eq('id','main').maybeSingle();
    if(error) return null;
    return data;
  }catch(e){ return null; }
}

// ============================================================================
// PUSH avec détection de conflits
// ============================================================================
async function doSyncPush(opts){
  opts = opts || {};
  const silent = !!opts.silent;
  const force = !!opts.force;
  if(!silent){
    const sb_check = await requireAuth(()=>doSyncPush({}));
    if(!sb_check) return;
  } else {
    if(!_authUser) return;
  }
  if(!canWrite()){
    if(!silent) toast(`Rôle "${_authRole||'?'}" ne permet pas d'écrire`,"error");
    return;
  }

  // Détection de conflit : la version cloud actuelle est-elle plus récente que ce que nous avons vu ?
  if(!force && _lastCloudVersion !== null){
    const cloud = await getCloudVersion();
    if(cloud && cloud.version > _lastCloudVersion && cloud.device_id !== getDeviceId()){
      // Conflit ! Un autre device a poussé entre temps
      if(silent){
        console.warn('[auto-sync] conflit détecté, sync différée');
        if(document.getElementById('sync_state')){
          document.getElementById('sync_state').innerHTML = '⚠ Conflit détecté';
          document.getElementById('sync_state').style.color = 'var(--alert)';
        }
        return; // ne pas pousser silencieusement en cas de conflit
      }
      // Ouvre le modal de résolution de conflit
      openConflictModal(cloud);
      return;
    }
  }

  const elState = document.getElementById('sync_state');
  if(!silent && elState){ elState.innerHTML = '⏳ Envoi…'; elState.style.color = 'var(--alert)'; }
  if(!silent) toast("Envoi en cours…","info");

  const sb = await ensureSupabase();
  if(!sb) return;
  const t0 = Date.now();
  const deviceId = getDeviceId();
  const userId = _authUser?.id || null;
  const payload = JSON.stringify(STATE);
  const sizeBytes = new Blob([payload]).size;
  const newVersion = Math.floor(Date.now()/1000);

  try{
    const { error } = await sb.from('app_state').upsert({
      id: 'main',
      data: STATE,
      device_id: deviceId,
      user_id: userId,
      version: newVersion,
      size_bytes: sizeBytes,
      notes: `Sync par ${_authUser?.email||'?'} · ${STATE.factures?.length||0} factures · ${STATE.tournees?.length||0} tournées · ${STATE.retours_marchandise?.length||0} retours`,
      updated_at: new Date().toISOString()
    }, { onConflict: 'id' });
    const ms = Date.now() - t0;

    sb.from('sync_log').insert({
      device_id: deviceId, user_id: userId, direction: 'push',
      status: error ? 'error' : 'success',
      records_count: 1, size_bytes: sizeBytes, duration_ms: ms,
      error_msg: error ? error.message : null
    }).then(()=>{});

    if(error){
      if(!silent && elState){ elState.innerHTML = '❌ ' + escapeHtml(error.message.slice(0,50)); elState.style.color = 'var(--danger)'; }
      if(!silent) toast("Erreur push : "+error.message,"error");
      return;
    }
    _lastCloudVersion = newVersion;
    _syncDirty = false;
    STATE.config._lastSync = new Date().toISOString();
    STATE.config._lastCloudVersion = newVersion;
    saveState();
    _syncDirty = false; // saveState le remet à true, on l'éteint car le push EST la sauvegarde
    updateSyncBadge();
    const elLast = document.getElementById('sync_last');
    if(elLast) elLast.textContent = fmtDateTime(STATE.config._lastSync);
    if(!silent && elState){ elState.innerHTML = `✓ Poussé (${ms} ms · ${(sizeBytes/1024).toFixed(1)} Ko)`; elState.style.color = 'var(--primary)'; }
    if(!silent) toast(`Sauvegarde cloud réussie (${(sizeBytes/1024).toFixed(1)} Ko en ${ms} ms)`,"success");

    // Push relationnel parallèle (best-effort, ne bloque pas l'UI)
    if(STATE.config.relational_sync !== false){
      doSyncPushRelational({silent:true}).then(()=>{});
    }
  }catch(e){
    if(!silent && elState){ elState.innerHTML = '❌ Réseau'; elState.style.color = 'var(--danger)'; }
    if(!silent) toast("Erreur réseau : "+e.message,"error");
  }
}

// ============================================================================
// PULL (récupère le cloud → écrase le local)
// ============================================================================
async function doSyncPull(){
  const sb = await requireAuth(doSyncPull);
  if(!sb) return;
  const elState = document.getElementById('sync_state');
  if(elState){ elState.innerHTML = '⏳ Téléchargement…'; elState.style.color = 'var(--alert)'; }
  try{
    const t0 = Date.now();
    const { data, error } = await sb.from('app_state').select('*').eq('id','main').maybeSingle();
    const ms = Date.now() - t0;
    if(error){
      if(elState){ elState.innerHTML = '❌ ' + escapeHtml(error.message.slice(0,50)); elState.style.color = 'var(--danger)'; }
      toast("Erreur pull : "+error.message,"error");
      return;
    }
    if(!data){
      if(elState){ elState.innerHTML = '⚠ Aucune donnée cloud'; elState.style.color = 'var(--alert)'; }
      toast("Aucune donnée trouvée dans Supabase — faites un Push d'abord","warn");
      return;
    }
    const remoteDate = new Date(data.updated_at).toLocaleString('fr-FR');
    const remoteDevice = data.device_id || 'inconnu';
    const sizeKo = data.size_bytes ? (data.size_bytes/1024).toFixed(1) : '?';
    const stats = `Factures: ${data.data.factures?.length||0} · Tournées: ${data.data.tournees?.length||0} · Retours: ${data.data.retours_marchandise?.length||0}`;
    if(!confirm(`⚠️ Remplacer les données locales par la version cloud ?\n\nVersion cloud :\n• Mise à jour : ${remoteDate}\n• Appareil source : ${remoteDevice}\n• Taille : ${sizeKo} Ko\n• ${stats}\n\nCette action est IRRÉVERSIBLE (sauvegarder local d'abord si besoin).`)){
      if(elState){ elState.innerHTML = '⏸ Annulé'; elState.style.color = 'var(--muted)'; }
      return;
    }

    sb.from('sync_log').insert({
      device_id: getDeviceId(), user_id: _authUser?.id || null, direction: 'pull',
      status: 'success', records_count: 1, size_bytes: data.size_bytes, duration_ms: ms
    }).then(()=>{});

    STATE = data.data;
    _lastCloudVersion = data.version;
    STATE.config._lastSync = new Date().toISOString();
    STATE.config._lastCloudVersion = data.version;
    saveState();
    _syncDirty = false;
    toast(`Données restaurées depuis le cloud (${sizeKo} Ko)`,"success");
    setTimeout(()=>location.reload(), 800);
  }catch(e){
    if(elState){ elState.innerHTML = '❌ Réseau'; elState.style.color = 'var(--danger)'; }
    toast("Erreur réseau : "+e.message,"error");
  }
}

window.resolveConflict = async function(choice){
  closeModal();
  if(choice === 'force-local'){
    await doSyncPush({force:true});
  } else if(choice === 'take-remote'){
    await doSyncPull();
  } else if(choice === 'export-then-pull'){
    exportJSON();
    await new Promise(r=>setTimeout(r, 500));
    await doSyncPull();
  }
};

// ============================================================================
// PUSH RELATIONNEL (alimente les tables normalisées pour BI/exports)
// ============================================================================
async function doSyncPushRelational(opts){
  opts = opts || {};
  const silent = !!opts.silent;
  const sb = silent ? (_supaClient || await ensureSupabase()) : await requireAuth(()=>doSyncPushRelational({}));
  if(!sb || !_authUser) return;
  if(!canWrite()) {
    if(!silent) toast("Rôle insuffisant pour écrire","error");
    return;
  }

  // Ordre : parents → enfants pour respecter les FK
  const PUSH_ORDER = [
    ['concessionnaires','concessionnaires'],
    ['fournisseurs','fournisseurs'],
    ['depots','depots'],
    ['articles','articles'],
    ['clients','clients'],
    ['achats','achats'],
    ['transferts','transferts'],
    ['factures','factures'],
    ['encaissements','encaissements'],
    ['consignations','consignations'],
    ['mouvements','mouvements'],
    ['tournees','tournees'],
    ['retours_marchandise','retours_marchandise'],
    ['ristournes_contrats','ristournes_contrats'],
  ];
  const results = [];
  let totalOk = 0, totalFail = 0, totalSkip = 0;
  const t0 = Date.now();

  for(const [tableName, stateKey] of PUSH_ORDER){
    const data = STATE[stateKey] || [];
    if(data.length === 0){
      results.push({table: tableName, count: 0, status: 'skipped'});
      totalSkip++;
      continue;
    }
    try{
      // Nettoie les champs JS-only (références circulaires, _seedExtras, etc.)
      const cleaned = data.map(d => {
        const obj = {};
        for(const k in d){
          if(k.startsWith('_')) continue;
          obj[k] = d[k];
        }
        return obj;
      });
      const { error } = await sb.from(tableName).upsert(cleaned, {onConflict:'id'});
      if(error){
        results.push({table: tableName, count: cleaned.length, status: 'error', error: error.message});
        totalFail++;
      } else {
        results.push({table: tableName, count: cleaned.length, status: 'ok'});
        totalOk++;
      }
    }catch(e){
      results.push({table: tableName, count: data.length, status: 'error', error: e.message});
      totalFail++;
    }
  }
  const ms = Date.now() - t0;

  if(silent){
    console.log(`[relational-sync] ${ms}ms · ok:${totalOk} fail:${totalFail} skip:${totalSkip}`, results);
    return {ok: totalFail === 0, results, ms};
  }
  // Affichage du rapport
  let report = `<div class="card" style="background:var(--bg)"><strong>📊 Sync relationnelle — ${ms} ms</strong><br>
    <span class="f12">✓ ${totalOk} tables peuplées · ⏭ ${totalSkip} vides · ❌ ${totalFail} erreurs</span></div>
    <table class="tbl mt-2"><thead><tr><th>Table</th><th>Lignes</th><th>Statut</th></tr></thead><tbody>`;
  results.forEach(r=>{
    const ico = r.status==='ok'?'✓':(r.status==='skipped'?'⏭':'❌');
    const cls = r.status==='ok'?'ok':(r.status==='skipped'?'muted':'bad');
    report += `<tr><td>${escapeHtml(r.table)}</td><td>${r.count}</td><td><span class="pill ${cls}">${ico} ${r.status}${r.error?': '+escapeHtml(r.error.slice(0,40)):''}</span></td></tr>`;
  });
  report += '</tbody></table>';
  if(totalFail > 0){
    report += `<div class="hint mt-2">💡 Erreurs fréquentes : tables relationnelles non créées (appliquez <code>supabase_relational_schema.sql</code>), ou contraintes FK violées. L'app continue de fonctionner avec app_state — les tables relationnelles sont un bonus pour le BI.</div>`;
  }
  MODALS.relReport = ()=> modalShell("📊 Rapport de synchronisation relationnelle", report,
    `<button class="btn" onclick="closeModal()">Fermer</button>`);
  openModal('relReport');
  return {ok: totalFail === 0, results, ms};
}

async function autoSyncTick(){
  // Conditions : connecté + en ligne + dirty + dernier tick > 30s
  if(!_authUser || !navigator.onLine || !_syncDirty) return;
  if(Date.now() - _lastAutoSyncAttempt < 30000) return;
  if(!canWrite()) return;
  _lastAutoSyncAttempt = Date.now();
  console.log('[auto-sync] tick → push silencieux');
  await doSyncPush({silent:true});
}

function startAutoSync(){
  if(_autoSyncTimer){ clearInterval(_autoSyncTimer); _autoSyncTimer = null; }
  if(!STATE.config.auto_sync_enabled) return;
  const intMin = STATE.config.auto_sync_interval_min || 5;
  _autoSyncTimer = setInterval(autoSyncTick, intMin * 60 * 1000);
  console.log(`[auto-sync] activé · intervalle ${intMin} min`);
}

function stopAutoSync(){
  if(_autoSyncTimer){ clearInterval(_autoSyncTimer); _autoSyncTimer = null; }
  console.log('[auto-sync] désactivé');
}

/* ====================================================================
   ============ MODULE REALTIME (v2.8) ============
   Notifications push depuis le cloud quand un autre device modifie
   ==================================================================== */

var _realtimeChannel = null;

async function startRealtime(){
  if(_realtimeChannel) return; // déjà actif
  const sb = await ensureSupabase();
  if(!sb || !_authUser) return;

  _realtimeChannel = sb
    .channel('app_state_changes')
    .on('postgres_changes',
        { event: '*', schema: 'public', table: 'app_state' },
        (payload) => handleRealtimeChange(payload)
    )
    .subscribe((status) => {
      console.log('[realtime] subscribe status:', status);
      if(status === 'SUBSCRIBED'){
        updateRealtimeBadge('connected');
      } else if(status === 'CHANNEL_ERROR' || status === 'TIMED_OUT'){
        updateRealtimeBadge('error');
      }
    });
}

function stopRealtime(){
  if(!_realtimeChannel) return;
  _realtimeChannel.unsubscribe();
  _realtimeChannel = null;
  updateRealtimeBadge('off');
}

function updateRealtimeBadge(state){
  const el = document.getElementById('realtime_state');
  if(!el) return;
  const map = {
    connected: { txt: '🟢 Realtime actif', color: 'var(--primary)' },
    off: { txt: '⏸ Realtime inactif', color: 'var(--muted)' },
    error: { txt: '❌ Erreur Realtime', color: 'var(--danger)' }
  };
  const s = map[state] || map.off;
  el.textContent = s.txt;
  el.style.color = s.color;
}

function handleRealtimeChange(payload){
  const newRow = payload.new;
  const oldRow = payload.old;
  console.log('[realtime] change:', payload.eventType, newRow);

  // Ignore les changements venant de ce device
  if(newRow && newRow.device_id === getDeviceId()) return;

  // Quelqu'un d'autre a modifié le cloud — notifie
  const sourceDevice = newRow?.device_id || 'autre appareil';
  const sourceUser = newRow?.notes?.match(/par ([^·]+)/)?.[1]?.trim() || 'utilisateur inconnu';
  toast(`🔔 Mise à jour cloud par ${escapeHtml(sourceUser)} · cliquez pour récupérer`, 'info');

  // Marque pour conflit potentiel à la prochaine push
  if(newRow?.version){
    // On NE met pas à jour _lastCloudVersion pour que la détection de conflit fonctionne
    // Le user doit explicitement pull pour récupérer ces changements
  }

  // Affiche un bandeau persistant
  showRealtimeBanner(sourceUser, newRow?.updated_at);
}

function showRealtimeBanner(user, date){
  let banner = document.getElementById('realtimeBanner');
  if(!banner){
    banner = document.createElement('div');
    banner.id = 'realtimeBanner';
    banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:linear-gradient(90deg,#1D3557,#0F8A5F);color:#fff;padding:10px 20px;z-index:9999;display:flex;justify-content:space-between;align-items:center;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.2);cursor:pointer';
    banner.onclick = ()=>{ doSyncPull(); banner.remove(); };
    document.body.prepend(banner);
  }
  const dateStr = date ? new Date(date).toLocaleTimeString('fr-FR') : '?';
  banner.innerHTML = `
    <span>🔔 <strong>${escapeHtml(user)}</strong> a modifié les données cloud à ${dateStr} — cliquez pour synchroniser</span>
    <span><button onclick="event.stopPropagation();this.parentNode.parentNode.remove()" style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:4px 10px;border-radius:4px;cursor:pointer">✕ Plus tard</button></span>
  `;
  // Auto-disparition après 60s
  setTimeout(()=>{ if(banner.parentNode) banner.remove(); }, 60000);
}

window.startRealtime = startRealtime;
window.stopRealtime = stopRealtime;

/* ====================================================================
   ============ MODULE QR SCANNER (v2.8) ============
   Scanner caméra natif pour identifier les clients par badge
   Lib jsQR (~80 Ko) chargée à la demande
   ==================================================================== */

var _qrStream = null;
var _qrAnimFrame = null;
var _qrLibLoaded = false;
var _qrCallback = null;

async function loadQRLib(){
  if(_qrLibLoaded || window.jsQR) { _qrLibLoaded = true; return true; }
  return new Promise(resolve=>{
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js';
    s.onload = ()=>{ _qrLibLoaded = true; resolve(true); };
    s.onerror = ()=>resolve(false);
    document.head.appendChild(s);
  });
}

async function openQRScanner(callback){
  _qrCallback = callback;
  const loaded = await loadQRLib();
  if(!loaded){
    toast("Lib jsQR non chargée — vérifiez la connexion internet","error");
    return;
  }
  openModal('qrScanner');
  setTimeout(startQRCamera, 300);
}

async function startQRCamera(){
  const video = document.getElementById('qrVideo');
  const canvas = document.getElementById('qrCanvas');
  const status = document.getElementById('qrStatus');
  if(!video || !canvas) return;

  try {
    _qrStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' }
    });
    video.srcObject = _qrStream;
    video.setAttribute('playsinline', true);
    await video.play();
    if(status) status.textContent = '📷 Scan en cours… Pointez vers un badge';
    requestAnimationFrame(tickQRScan);
  } catch(e){
    if(status) status.textContent = '❌ Caméra non accessible : ' + e.message;
    toast("Caméra non accessible — vérifiez les permissions","error");
  }
}

function tickQRScan(){
  const video = document.getElementById('qrVideo');
  const canvas = document.getElementById('qrCanvas');
  if(!video || !canvas) return;
  if(video.readyState !== video.HAVE_ENOUGH_DATA){
    _qrAnimFrame = requestAnimationFrame(tickQRScan);
    return;
  }
  const ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = window.jsQR(imageData.data, imageData.width, imageData.height, {
    inversionAttempts: 'dontInvert'
  });
  if(code && code.data){
    // QR détecté !
    handleQRDetected(code.data);
    return;
  }
  _qrAnimFrame = requestAnimationFrame(tickQRScan);
}

function handleQRDetected(text){
  console.log('[qr] détecté:', text);
  // Beep visuel/sonore
  const status = document.getElementById('qrStatus');
  if(status){ status.textContent = '✓ Détecté : ' + text; status.style.color = 'var(--primary)'; }
  stopQRCamera();
  setTimeout(()=>{
    closeModal();
    // Format attendu : "SANIX:<code_badge>" ou juste le code badge
    let codeBadge = text.trim();
    if(codeBadge.startsWith('SANIX:')) codeBadge = codeBadge.slice(6);
    if(_qrCallback){
      _qrCallback(codeBadge);
      _qrCallback = null;
    } else {
      // Recherche client par code et ouvre sa fiche
      const cl = findClientByCode(codeBadge);
      if(cl){
        toast('Client trouvé : ' + cl.nom, 'success');
        // Si on est en mode livreur et tournée en cours, ouvre la livraison
        const t = STATE.tournees.find(x=>x.statut==='en_cours');
        if(t){
          const liv = t.livraisons.find(l=>l.client_id===cl.id && (l.statut==='pending'||!l.statut));
          if(liv){ openModal('effectuerLivraison', t.id+'::'+liv.id); return; }
        }
        openModal('detailClient', cl.id);
      } else {
        toast('Code badge inconnu : ' + codeBadge, 'error');
      }
    }
  }, 200);
}

function stopQRCamera(){
  if(_qrAnimFrame){ cancelAnimationFrame(_qrAnimFrame); _qrAnimFrame = null; }
  if(_qrStream){
    _qrStream.getTracks().forEach(t=>t.stop());
    _qrStream = null;
  }
}

/* ====================================================================

   Encodeur QR minimal — version 4 (33x33), correction L
   ==================================================================== */
// Source : algorithme QR standard simplifié
// Génère un SVG QR à partir d'un texte court (~25 chars max pour version 3)

function genQRSvg(text, size){
  size = size || 120;
  // Pour ce prototype, on utilise une URL CDN qui génère le QR côté serveur
  // (l'app peut le pré-télécharger une fois et le cacher)
  // En production : embedder un encodeur QR pur-JS (~25 Ko) pour fonctionner offline
  const payload = "SANIX:" + text;
  const url = "https://api.qrserver.com/v1/create-qr-code/?size="+size+"x"+size+"&data="+encodeURIComponent(payload)+"&format=svg&margin=2";
  return `<img src="${url}" width="${size}" height="${size}" style="display:block;border-radius:4px;background:#fff" alt="QR ${escapeHtml(text)}" loading="lazy">`;
}

async function logAuditEvent(action, tableName, recordId, payload, notes){
  if(!_authUser || !_supaClient) return;
  try {
    await _supaClient.rpc('log_audit_event', {
      p_action: action,
      p_table_name: tableName || null,
      p_record_id: recordId || null,
      p_payload: payload || null,
      p_device_id: getDeviceId(),
      p_notes: notes || null
    });
  } catch(e) {
    console.warn('[audit] échec log :', e.message);
  }

async function verifyAuditChain(){
  if(!_supaClient){
    toast("Connectez-vous d'abord","error");
    return;
  }
  toast("Vérification de la chaîne d'audit…","info");
  try {
    const { data, error } = await _supaClient.rpc('verify_audit_chain', { p_tenant_id: 'sanix_main' });
    if(error){ toast("Erreur : "+error.message,"error"); return; }
    const r = data?.[0];
    if(!r){ toast("Aucun résultat","warn"); return; }
    if(r.ok){
      alert(`✅ Chaîne d'audit INTÈGRE\n\n${r.total_entries} entrées vérifiées · aucune modification détectée a posteriori.\n\nLes données sont prouvées non-altérées depuis leur enregistrement.`);
    } else {
      alert(`❌ CHAÎNE D'AUDIT COMPROMISE\n\nEntrée corrompue : #${r.first_corruption}\nMessage : ${r.message}\n\nQuelqu'un a modifié l'audit_log après-coup, ou il y a eu une erreur technique. À investiguer.`);
    }
  } catch(e){
    toast("Erreur : "+e.message,"error");
  }
}

// --- Connexion email/password ---
async function doSignIn(){
  const email = $("#auth_signin_email").value.trim();
  const password = $("#auth_signin_pwd").value;
  if(!email || !password){ toast("Email et mot de passe requis","error"); return; }
  const sb = await ensureSupabase();
  if(!sb) return;
  const btn = $("#auth_signin_btn");
  if(btn){ btn.disabled = true; btn.textContent = "⏳ Connexion…"; }
  try{
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if(error){
      toast("Échec : "+error.message,"error");
      if(btn){ btn.disabled = false; btn.textContent = "Se connecter"; }
      return;
    }
    _authUser = data.user;
    toast("Connecté ✓","success");
    closeModal();
    if(_pendingAfterAuth){ const fn = _pendingAfterAuth; _pendingAfterAuth = null; setTimeout(fn, 200); }
    else { route("parametrage"); }
  }catch(e){
    toast("Erreur : "+e.message,"error");
    if(btn){ btn.disabled = false; btn.textContent = "Se connecter"; }
  }
}

// --- Inscription email/password ---
async function doSignUp(){
  const email = $("#auth_signup_email").value.trim();
  const password = $("#auth_signup_pwd").value;
  const confirm = $("#auth_signup_pwd2").value;
  const fullName = $("#auth_signup_name").value.trim();
  if(!email || !password){ toast("Email et mot de passe requis","error"); return; }
  if(password.length < 6){ toast("Mot de passe : 6 caractères minimum","error"); return; }
  if(password !== confirm){ toast("Mots de passe différents","error"); return; }
  const sb = await ensureSupabase();
  if(!sb) return;
  const btn = $("#auth_signup_btn");
  if(btn){ btn.disabled = true; btn.textContent = "⏳ Création…"; }
  try{
    const { data, error } = await sb.auth.signUp({
      email, password,
      options: {
        data: { full_name: fullName || email.split('@')[0], role: 'manager' },
        emailRedirectTo: window.location.href
      }
    });
    if(error){
      toast("Échec : "+error.message,"error");
      if(btn){ btn.disabled = false; btn.textContent = "Créer le compte"; }
      return;
    }
    if(data.user && !data.session){
      toast("Compte créé. Vérifiez votre email pour confirmer.","success");
    } else {
      _authUser = data.user;
      toast("Compte créé et connecté ✓","success");
    }
    closeModal();
    if(_pendingAfterAuth){ const fn = _pendingAfterAuth; _pendingAfterAuth = null; setTimeout(fn, 200); }
  }catch(e){
    toast("Erreur : "+e.message,"error");
    if(btn){ btn.disabled = false; btn.textContent = "Créer le compte"; }
  }
}

// Génère un numéro d'écriture séquentiel pour un journal
function genNumeroEcriture(journalCode){
  const year = new Date().getFullYear();
  const seq = STATE.ecritures.filter(e=>e.journal_code===journalCode &&
                                          (e.numero||"").startsWith(journalCode+"-"+year)).length + 1;
  return journalCode+"-"+year+"-"+String(seq).padStart(5,"0");
}

// Crée une écriture comptable (avec contrôle équilibre débit/crédit)
function creerEcriture({date, journal, libelle, reference, lignes, source_table, source_id, auto}){
  const totD = lignes.reduce((s,l)=>s+(l.debit||0), 0);
  const totC = lignes.reduce((s,l)=>s+(l.credit||0), 0);
  if(Math.abs(totD-totC) > 1){
    console.warn(`[compta] Écriture déséquilibrée ${reference||libelle} · D=${totD} C=${totC} écart=${totD-totC}`);
    return null;
  }
  // Si totD = totC = 0, on saute (écriture vide inutile)
  if(totD === 0 && totC === 0){
    return null;
  }
  const id = uid("ec_");
  const ecriture = {
    id,
    journal_code: journal,
    numero: genNumeroEcriture(journal),
    date_ecriture: (date || new Date().toISOString()).slice(0,10),
    libelle, reference,
    source_table, source_id,
    statut: "brouillon",
    auto_generated: !!auto,
    saisi_par: _authUser?.id || null,
    created_at: now(),
    lignes: lignes.map((l,i)=>({
      id: uid("el_"),
      ordre: i+1,
      compte: l.compte,
      compte_aux: l.compte_aux || null,
      libelle: l.libelle || libelle,
      debit: l.debit || 0,
      credit: l.credit || 0,
      lettrage: l.lettrage || null
    }))
  };
  STATE.ecritures.push(ecriture);
  saveState();
  return ecriture;
}

// ==================== AUTO-GÉNÉRATION DES ÉCRITURES ====================

// Vente (facture FNE) → écriture vente
// IMPORTANT : on calcule le TTC depuis HT+TVA+consigne (garantit l'équilibre)
// Cela couvre aussi les vieilles factures qui ne stockent que montant_ht
function genEcritureVente(facture){
  if(STATE.ecritures.find(e=>e.source_table==="factures" && e.source_id===facture.id)) return null;
  // Skip les avoirs (générés par genEcritureRetour)
  if(facture.statut === "Avoir") return null;
  const cl = getClient(facture.client_id);
  // Compte client : custom si défini, sinon 411 par défaut
  const compteClient = cl?.compte_compta || "411";
  // Récupère les composants avec fallbacks pour formats legacy
  const ht   = facture.montant_liquide_ht ?? facture.montant_ht ?? 0;
  const tva  = facture.montant_tva ?? 0;
  const cons = facture.montant_consigne_nette ?? facture.montant_consigne ?? 0;
  const ttc_calc = ht + tva + cons;
  // Si rien à comptabiliser, skip
  if(ttc_calc <= 0) return null;
  const libelle = `Vente ${facture.numero||""} - ${cl?.nom||""}`.trim();
  const lignes = [];
  lignes.push({ compte:compteClient, compte_aux:facture.client_id, debit:ttc_calc, libelle });
  if(ht > 0)   lignes.push({ compte:"701",  credit:ht,   libelle:"Ventes liquide HT" });
  if(tva > 0)  lignes.push({ compte:"4431", credit:tva,  libelle:"TVA collectée 18%" });
  if(cons > 0) lignes.push({ compte:"4194", compte_aux:facture.client_id, credit:cons, libelle:"Emballages consignés" });
  // Si une ristourne a réduit le TTC stocké, on enregistre la différence en 7019
  const ttc_reel = facture.montant_ttc ?? ttc_calc;
  const ecart_ristourne = ttc_calc - ttc_reel;
  if(ecart_ristourne > 1){
    // Le client doit moins que la décomposition → ristourne accordée
    lignes.push({ compte:"7019", debit:ecart_ristourne, libelle:"Ristourne accordée" });
    // Et le débit 411 réel est ttc_reel, pas ttc_calc → on réajuste
    lignes[0].debit = ttc_reel;
  }
  return creerEcriture({
    date: facture.date, journal:"VTE", libelle, reference: facture.numero,
    lignes, source_table:"factures", source_id:facture.id, auto:true
  });
}

// Encaissement → écriture règlement
function genEcritureEncaissement(enc){
  if(STATE.ecritures.find(e=>e.source_table==="encaissements" && e.source_id===enc.id)) return null;
  if(!enc.montant || enc.montant === 0) return null;
  const cl = getClient(enc.client_id);
  const compteClient = cl?.compte_compta || "411";
  const compteTreso = compteTresorerie(enc.mode);
  const journal = enc.mode==="Espèces" ? "CAI" :
                  enc.mode==="Wave" ? "WAV" :
                  enc.mode==="Orange Money" ? "OM" :
                  enc.mode==="MTN MoMo" ? "MTN" : "BNQ";
  const libelle = `Règlement ${enc.mode||""} - ${cl?.nom||""} - ${enc.reference||""}`.trim();
  const montant = Math.abs(enc.montant);
  const isRemb = enc.montant < 0;
  const lignes = isRemb ? [
    { compte:compteTreso, credit: montant, libelle },
    { compte:compteClient, compte_aux:enc.client_id, debit: montant, libelle }
  ] : [
    { compte:compteTreso, debit: montant, libelle },
    { compte:compteClient, compte_aux:enc.client_id, credit: montant, libelle }
  ];
  return creerEcriture({
    date: enc.date, journal, libelle, reference: enc.reference,
    lignes, source_table:"encaissements", source_id:enc.id, auto:true
  });
}

// Achat → écriture achat (TTC calculé depuis HT+TVA pour garantir l'équilibre)
function genEcritureAchat(achat){
  if(STATE.ecritures.find(e=>e.source_table==="achats" && e.source_id===achat.id)) return null;
  const conc = achat.concessionnaire_id ? STATE.concessionnaires.find(c=>c.id===achat.concessionnaire_id) : null;
  const four = achat.fournisseur_id ? STATE.fournisseurs.find(f=>f.id===achat.fournisseur_id) : null;
  const partenaire = conc || four;
  // Compte par défaut selon type, puis override si custom défini sur le tiers
  const compteDefault = conc ? "4011" : "401";
  const compteTiers = partenaire?.compte_compta || compteDefault;
  const libelle = `Achat ${achat.numero||""} - ${partenaire?.nom||""}`.trim();
  const ht = achat.montant_ht || 0;
  const tva = achat.montant_tva || 0;
  // Recalcule le TTC pour garantir l'équilibre (ignore montant_ttc stocké qui peut diverger)
  const ttc = ht + tva;
  if(ttc <= 0) return null;
  const lignes = [];
  if(ht > 0)  lignes.push({ compte:"601",  debit:ht,  libelle:"Achats marchandises HT" });
  if(tva > 0) lignes.push({ compte:"4452", debit:tva, libelle:"TVA déductible" });
  lignes.push({ compte:compteTiers, compte_aux: partenaire?.id, credit:ttc, libelle });
  return creerEcriture({
    date: achat.date, journal:"ACH", libelle, reference: achat.bl_numero,
    lignes, source_table:"achats", source_id:achat.id, auto:true
  });
}

// Retour marchandise → écriture contre-passation
// Idem : on recalcule le TTC depuis les composants
function genEcritureRetour(retour){
  if(STATE.ecritures.find(e=>e.source_table==="retours_marchandise" && e.source_id===retour.id)) return null;
  const cl = getClient(retour.client_id);
  const compteClient = cl?.compte_compta || "411";
  const libelle = `Avoir ${retour.numero||""} - ${cl?.nom||""}`.trim();
  const ht   = retour.montant_liquide_ht_total ?? 0;
  const tva  = retour.montant_tva_total ?? 0;
  const cons = retour.montant_consigne_total ?? 0;
  const ttc_calc = ht + tva + cons;
  if(ttc_calc <= 0) return null;
  const lignes = [];
  lignes.push({ compte:compteClient, compte_aux:retour.client_id, credit:ttc_calc, libelle });
  if(ht > 0)   lignes.push({ compte:"701",  debit:ht,   libelle:"Annulation vente HT" });
  if(tva > 0)  lignes.push({ compte:"4431", debit:tva,  libelle:"Annulation TVA" });
  if(cons > 0) lignes.push({ compte:"4194", compte_aux:retour.client_id, debit:cons, libelle:"Annulation consigne" });
  return creerEcriture({
    date: retour.date, journal:"VTE", libelle, reference: retour.numero,
    lignes, source_table:"retours_marchandise", source_id:retour.id, auto:true
  });
}

// Régénération massive (rétroactif sur les données existantes)
function regenererToutesEcritures(){
  if(!confirm("Régénérer toutes les écritures comptables depuis les opérations existantes ?\n\nLes écritures auto-générées existantes seront remplacées (les manuelles seront préservées).")) return;
  STATE.ecritures = STATE.ecritures.filter(e=>!e.auto_generated);
  let cnt = 0;
  (STATE.factures||[]).forEach(f=>{ if(genEcritureVente(f)) cnt++; });
  (STATE.encaissements||[]).forEach(e=>{ if(genEcritureEncaissement(e)) cnt++; });
  (STATE.achats||[]).forEach(a=>{ if(genEcritureAchat(a)) cnt++; });
  (STATE.retours_marchandise||[]).forEach(r=>{ if(genEcritureRetour(r)) cnt++; });
  saveState();
  toast(`${cnt} écritures générées automatiquement`, "success");
  route("ecritures");
}

// ==================== KPI / SOLDES ====================

function comptaKPI(){
  let creances=0, dettes=0, consignations=0, caisse=0, banque=0, mm=0;
  let tva_coll=0, tva_ded=0, ca_ht=0, charges=0, produits=0;
  (STATE.ecritures||[]).forEach(e=>{
    e.lignes.forEach(l=>{
      const c = l.compte||"";
      const d = l.debit||0, cr = l.credit||0;
      if(c.startsWith("411") && !c.startsWith("4194")) creances += d - cr;
      if(c.startsWith("40")) dettes += cr - d;
      if(c.startsWith("4194")) consignations += cr - d;
      if(c.startsWith("57")) caisse += d - cr;
      if(c.startsWith("52")) banque += d - cr;
      if(c.startsWith("53")) mm += d - cr;
      if(c.startsWith("4431")) tva_coll += cr - d;
      if(c.startsWith("4452")) tva_ded += d - cr;
      if(c.startsWith("701")) ca_ht += cr - d;
      if(c.startsWith("6")) charges += d - cr;
      if(c.startsWith("7")) produits += cr - d;
    });
  });
  return { creances, dettes, consignations, caisse, banque, mm, tva_coll, tva_ded, ca_ht, charges, produits, resultat: produits - charges };
}

function soldeCompte(compte, compte_aux){
  let d=0, cr=0;
  (STATE.ecritures||[]).forEach(e=>{
    e.lignes.forEach(l=>{
      if(l.compte === compte && (!compte_aux || l.compte_aux===compte_aux)){
        d += l.debit||0;
        cr += l.credit||0;
      }
    });
  });
  return { debit:d, credit:cr, solde: d-cr };
}

function topDebiteurs(n){
  const map = {};
  (STATE.ecritures||[]).forEach(e=>{
    e.lignes.forEach(l=>{
      if((l.compte||"").startsWith("411") && !(l.compte||"").startsWith("4194") && l.compte_aux){
        if(!map[l.compte_aux]) map[l.compte_aux] = 0;
        map[l.compte_aux] += (l.debit||0) - (l.credit||0);
      }
    });
  });
  return Object.entries(map)
    .map(([id,solde])=>({client:getClient(id), solde}))
    .filter(x=>x.solde>0)
    .sort((a,b)=>b.solde-a.solde)
    .slice(0,n||10);
}

function topCreanciers(n){
  const map = {};
  (STATE.ecritures||[]).forEach(e=>{
    e.lignes.forEach(l=>{
      if((l.compte||"").startsWith("40") && l.compte_aux){
        if(!map[l.compte_aux]) map[l.compte_aux] = 0;
        map[l.compte_aux] += (l.credit||0) - (l.debit||0);
      }
    });
  });
  return Object.entries(map)
    .map(([id,solde])=>{
      const part = STATE.fournisseurs.find(f=>f.id===id) || STATE.concessionnaires.find(c=>c.id===id);
      return {partenaire:part, solde};
    })
    .filter(x=>x.solde>0)
    .sort((a,b)=>b.solde-a.solde)
    .slice(0,n||10);
}

window.validerEcriture = function(id, niveau){
  const e = STATE.ecritures.find(x=>x.id===id);
  if(!e) return;
  if(niveau==="validee"){
    e.statut = "validee"; e.valide_par = _authUser?.id || null; e.valide_le = now();
    toast("Écriture validée (niveau comptable)","success");
  } else if(niveau==="validee_finale"){
    e.statut = "validee_finale"; e.valide_final_par = _authUser?.id || null; e.valide_final_le = now();
    toast("Validation finale OK (chef comptable)","success");
  } else if(niveau==="cloturee"){
    if(!confirm("Clôturer cette écriture ? Elle deviendra IMMUABLE.")) return;
    e.statut = "cloturee";
    toast("Écriture clôturée","success");
  }
  saveState();
  closeModal();
  route("ecritures");
};

window.supprimerEcriture = function(id){
  if(!confirm("Supprimer cette écriture brouillon ? (irréversible)")) return;
  STATE.ecritures = STATE.ecritures.filter(e=>e.id!==id);
  saveState();
  closeModal();
  route("ecritures");
  toast("Écriture supprimée","success");
};

// Export CSV des écritures filtrées
window.exportEcrituresCSV = function(){
  let list = (STATE.ecritures||[]).slice();
  if(_ecFilters.journal) list = list.filter(e=>e.journal_code===_ecFilters.journal);
  if(_ecFilters.statut) list = list.filter(e=>e.statut===_ecFilters.statut);
  if(_ecFilters.df) list = list.filter(e=>e.date_ecriture >= _ecFilters.df);
  if(_ecFilters.dt) list = list.filter(e=>e.date_ecriture <= _ecFilters.dt);
  if(_ecFilters.compte) list = list.filter(e=>e.lignes.some(l=>(l.compte||"").startsWith(_ecFilters.compte)));

  const rows = [["N°","Date","Journal","Compte","Intitulé compte","Auxiliaire","Libellé","Référence","Débit","Crédit","Statut"]];
  list.forEach(e=>{
    e.lignes.forEach(l=>{
      const cmpt = (STATE.plan_comptable||[]).find(c=>c.numero===l.compte);
      const aux = l.compte_aux ? (getClient(l.compte_aux)?.nom || STATE.fournisseurs.find(f=>f.id===l.compte_aux)?.nom || STATE.concessionnaires.find(c=>c.id===l.compte_aux)?.nom || l.compte_aux) : '';
      rows.push([e.numero, e.date_ecriture, e.journal_code, l.compte, cmpt?.intitule||'', aux, e.libelle, e.reference||'', l.debit||0, l.credit||0, e.statut]);
    });
  });
  const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(";")).join("\n");
  const blob = new Blob(["\ufeff"+csv], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `journal_ecritures_${today()}.csv`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
  toast(`${list.length} écritures exportées`,"success");
};

var _ecompteFilters = { type:"client", id:"", df:"", dt:"" };

VIEWS.etatCompte = function(){
  const w = document.createElement("div");
  const f = _ecompteFilters;
  // Liste des tiers selon le type sélectionné
  const tiers = f.type === "client"     ? (STATE.clients||[]) :
                f.type === "fournisseur" ? (STATE.fournisseurs||[]) :
                f.type === "concessionnaire" ? (STATE.concessionnaires||[]) : [];

  // Récupère les mouvements du tiers sélectionné
  let mouvements = [];
  // Détermine le compte racine effectif : custom si défini, sinon défaut par type
  const tierSelTmp = tiers.find(t=>t.id === f.id);
  const compteRacineDefault = f.type === "client" ? "411" :
                              f.type === "fournisseur" ? "401" :
                              f.type === "concessionnaire" ? "4011" : "411";
  const compteRacine = tierSelTmp?.compte_compta || compteRacineDefault;
  const compteConsigne = f.type === "client" ? "4194" : null;

  if(f.id){
    (STATE.ecritures||[]).forEach(e=>{
      // Filtre par date
      if(f.df && e.date_ecriture < f.df) return;
      if(f.dt && e.date_ecriture > f.dt) return;
      e.lignes.forEach((l,idx)=>{
        if(l.compte_aux !== f.id) return;
        // Le compte doit correspondre (compte racine custom/défaut OU compte consigne 4194 pour clients)
        if(!l.compte.startsWith(compteRacine) && (!compteConsigne || !l.compte.startsWith(compteConsigne))) return;
        mouvements.push({
          ecriture_id: e.id,
          date: e.date_ecriture,
          journal: e.journal_code,
          numero: e.numero,
          reference: e.reference,
          libelle: l.libelle || e.libelle,
          compte: l.compte,
          debit: l.debit||0,
          credit: l.credit||0,
          statut: e.statut,
          source_table: e.source_table,
          source_id: e.source_id,
          lettrage: l.lettrage
        });
      });
    });
    mouvements.sort((a,b)=>new Date(a.date)-new Date(b.date));
  }

  // Calcul solde progressif
  let solde = 0;
  mouvements.forEach(m=>{ solde += m.debit - m.credit; m.solde_progressif = solde; });
  const totD = mouvements.reduce((s,m)=>s+m.debit, 0);
  const totC = mouvements.reduce((s,m)=>s+m.credit, 0);
  const soldeFinal = totD - totC;

  // Tiers sélectionné
  const tierSel = tiers.find(t=>t.id === f.id);

  w.innerHTML = `

      <div><h2>📋 État de compte détaillé <span class="sub">Grand livre auxiliaire · ${mouvements.length} mouvement(s)</span></h2></div>

            <option value="concessionnaire" ${f.type==='concessionnaire'?'selected':''}>🏭 Concessionnaire (4011)</option>

        <div class="fld"><label>Choisir le tiers</label>
          <select onchange="_ecompteFilters.id=this.value;route('etatCompte')">
            <option value="">— Sélectionner —</option>
            ${tiers.slice().sort((a,b)=>(a.nom||'').localeCompare(b.nom||'')).map(t=>`<option value="${escapeHtml(t.id)}" ${f.id===t.id?'selected':''}>${escapeHtml(t.nom)}</option>`).join("")}
          </select></div>
        <div class="fld"><label>Date du</label><input type="date" value="${f.df}" onchange="_ecompteFilters.df=this.value;route('etatCompte')"></div>
        <div class="fld"><label>Date au</label><input type="date" value="${f.dt}" onchange="_ecompteFilters.dt=this.value;route('etatCompte')"></div>
      </div>
    </div>

    ${!tierSel ? `<div class="empty"><span class="ico">👈</span>Choisissez un ${f.type==='client'?'client':f.type==='fournisseur'?'fournisseur':'concessionnaire'} dans la liste pour voir son état de compte</div>` :
      `<div id="etatCompteContent">
        <div class="card mb-2" style="background:linear-gradient(135deg,var(--primary-light),var(--bg))">
          <div class="flex between">
            <div>
              <h2 style="margin:0">${escapeHtml(tierSel.nom)}</h2>
              <div class="f12 muted mt-1">
                ${tierSel.type?escapeHtml(tierSel.type)+' · ':''}${tierSel.telephone?'📞 '+escapeHtml(tierSel.telephone)+' · ':''}${tierSel.zone?'📍 '+escapeHtml(tierSel.zone):''}

window.exportEtatCompteCSV = function(){
  const f = _ecompteFilters;
  const tiers = f.type === "client" ? (STATE.clients||[]) :
                f.type === "fournisseur" ? (STATE.fournisseurs||[]) :
                f.type === "concessionnaire" ? (STATE.concessionnaires||[]) : [];
  const t = tiers.find(x=>x.id===f.id);
  if(!t){ toast("Aucun tiers sélectionné","error"); return; }
  const compteRacineDefault = f.type === "client" ? "411" : f.type === "fournisseur" ? "401" : "4011";
  const compteRacine = t.compte_compta || compteRacineDefault;
  const compteConsigne = f.type === "client" ? "4194" : null;
  const mouvements = [];
  (STATE.ecritures||[]).forEach(e=>{
    if(f.df && e.date_ecriture < f.df) return;
    if(f.dt && e.date_ecriture > f.dt) return;
    e.lignes.forEach(l=>{
      if(l.compte_aux !== f.id) return;
      if(!l.compte.startsWith(compteRacine) && (!compteConsigne || !l.compte.startsWith(compteConsigne))) return;
      mouvements.push({date:e.date_ecriture, journal:e.journal_code, numero:e.numero, reference:e.reference||'', libelle:l.libelle||e.libelle, compte:l.compte, debit:l.debit||0, credit:l.credit||0, statut:e.statut});
    });
  });
  mouvements.sort((a,b)=>new Date(a.date)-new Date(b.date));
  let solde = 0;
  const rows = [
    [`État de compte : ${t.nom}`],
    [`Période : ${f.df||'début'} → ${f.dt||"aujourd'hui"}`],
    [`Compte collectif : ${compteRacine}`, `Auxiliaire : ${t.id}`],
    [],
    ["Date","Journal","N° écriture","Référence","Libellé","Compte","Débit","Crédit","Solde","Statut"]
  ];
  mouvements.forEach(m=>{
    solde += m.debit - m.credit;
    rows.push([m.date, m.journal, m.numero, m.reference, m.libelle, m.compte, m.debit, m.credit, solde, m.statut]);
  });
  rows.push([], ["TOTAUX","","","","","", mouvements.reduce((s,m)=>s+m.debit,0), mouvements.reduce((s,m)=>s+m.credit,0), solde]);
  const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(";")).join("\n");
  const blob = new Blob(["\ufeff"+csv], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `etat_compte_${(t.nom||'tiers').replace(/[^a-z0-9]/gi,'_')}_${today()}.csv`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
  toast(`État de compte ${t.nom} exporté`,"success");
};

/* ====================================================================
   ============ SYSTÈME DE LOGIN LOCAL — DÉFINITIF (v2.14) ============
   Mot de passe stocké LOCAL (hashé SHA-256 + salt)
   AUCUNE dépendance cloud · marche offline · 0 latence
   ==================================================================== */

const LOCAL_AUTH_KEY = 'sanix_local_auth_v1';

// Hash SHA-256 du mot de passe avec salt via Web Crypto API
async function hashPwd(pwd, salt){
  const data = new TextEncoder().encode(pwd + '|' + salt);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function genSalt(){
  const arr = new Uint8Array(16);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function localAuthExists(){
  return !!localStorage.getItem(LOCAL_AUTH_KEY);
}

function getLocalAuth(){
  try { return JSON.parse(localStorage.getItem(LOCAL_AUTH_KEY)); } catch { return null; }
}

async function setupLocalPwd(pwd){
  const salt = genSalt();
  const hash = await hashPwd(pwd, salt);
  localStorage.setItem(LOCAL_AUTH_KEY, JSON.stringify({
    salt, hash, created_at: new Date().toISOString()
  }));
}

async function verifyLocalPwd(pwd){
  const auth = getLocalAuth();
  if(!auth) return false;
  const hash = await hashPwd(pwd, auth.salt);
  return hash === auth.hash;
}

function showLoginScreen(){
  const ov = document.getElementById('loginOverlay');

  const sub = document.getElementById('loginSubtitle');
  if(sub) sub.textContent = setup
    ? "Bienvenue ! Créez votre mot de passe administrateur"
    : "Entrez votre mot de passe administrateur";
  // Champ de confirmation visible seulement au premier setup
  const pwd2Wrap = document.getElementById('loginPwd2Wrap');

  const btn = document.getElementById('loginBtn');

// Handler du bouton Entrer / Créer
window.doLocalLogin = async function(){
  const pwd = document.getElementById('loginPwd').value;
  const pwd2 = document.getElementById('loginPwd2').value;
  const setup = !localAuthExists();

  if(!pwd || pwd.length < 4){
    showLoginError("Mot de passe trop court (minimum 4 caractères)");
    return;
  }

  const btn = document.getElementById('loginBtn');
  const original = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '⏳ Patientez…';

  try {
    if(setup){
      // Premier setup : vérifier la confirmation
      if(pwd !== pwd2){
        showLoginError("Les deux mots de passe ne correspondent pas");
        btn.disabled = false;
        btn.innerHTML = original;
        return;
      }
      await setupLocalPwd(pwd);
      // Active le mode admin local
      activateLocalAdmin();
      sessionStorage.setItem('sanix_logged_in', '1');
      hideLoginScreen();
      toast("✓ Mot de passe créé · Bienvenue Administrateur !", "success");
    } else {
      // Login normal : vérifier le mot de passe
      const ok = await verifyLocalPwd(pwd);
      if(!ok){
        showLoginError("Mot de passe incorrect");
        btn.disabled = false;
        btn.innerHTML = original;
        return;
      }
      // Active le mode admin local
      activateLocalAdmin();
      sessionStorage.setItem('sanix_logged_in', '1');
      hideLoginScreen();
      toast("✓ Connecté en tant qu'administrateur", "success");
    }
  } catch(e){
    showLoginError("Erreur : " + e.message);
    btn.disabled = false;
    btn.innerHTML = original;
  }
};

/* ====================================================================
   ============ MODULE AVOIRS CLIENTS (v2.13) ============
   Avoirs autonomes (commercial / financier / avance) + agrégation retours
   Compte SYSCOHADA : 4193 (Clients - Avoirs à régulariser)
   ==================================================================== */

const AVOIR_TYPES = {
  commercial: { ico:'🎁', label:'Commercial',  desc:'Geste commercial, fidélité, ristourne exceptionnelle' },
  financier:  { ico:'💸', label:'Financier',   desc:'Erreur facturation, double encaissement, régularisation' },
  avance:     { ico:'📥', label:'Avance',      desc:'Acompte reçu avant livraison' },
  retour:     { ico:'↩️', label:'Retour',      desc:'Avoir lié à un retour de marchandise' },
};

// Génère un numéro d'avoir séquentiel
function genNumeroAvoir(){
  const year = new Date().getFullYear();
  const seq = (STATE.avoirs||[]).filter(a=>(a.numero||"").startsWith("AV-"+year)).length + 1;
  return "AV-"+year+"-"+String(seq).padStart(5,"0");
}

// Crée un avoir et génère l'écriture comptable correspondante
function creerAvoir({client_id, type, motif, montant_ht, tva_applicable, notes, source, source_id}){
  const cl = getClient(client_id);
  if(!cl){ toast("Client introuvable","error"); return null; }
  const ht = parseFloat(montant_ht) || 0;
  if(ht <= 0){ toast("Montant doit être positif","error"); return null; }
  const tva = tva_applicable ? Math.round(ht * 0.18) : 0;
  const ttc = ht + tva;

  const avoir = {
    id: uid("av_"),
    numero: genNumeroAvoir(),
    date: today(),
    client_id,
    type: type || 'commercial',
    motif: motif || '',
    montant_ht: ht,
    montant_tva: tva,
    montant_ttc: ttc,
    statut: 'emis',
    montant_utilise: 0,
    montant_restant: ttc,
    source: source || 'manuel',
    source_id: source_id || null,
    notes: notes || '',
    created_at: now(),
    applications: []  // [{id, date, type:"facture"|"remboursement", facture_id?, montant, mode?, reference?}]
  };

  STATE.avoirs.push(avoir);

  // Génère l'écriture comptable d'émission
  // Débit 7019 (RRR accordés) : HT + Débit 4431 (TVA collectée à régulariser) : TVA
  // Crédit 4193 (Clients - Avoirs à régulariser) compte_aux = client_id : TTC
  const compteClient4193 = "4193"; // toujours 4193 pour les avoirs à régulariser
  const lignes = [];
  if(ht > 0)  lignes.push({ compte:"7019", debit:ht,  libelle:"Avoir "+AVOIR_TYPES[type]?.label+" - "+cl.nom });
  if(tva > 0) lignes.push({ compte:"4431", debit:tva, libelle:"Annulation TVA sur avoir" });
  lignes.push({ compte:compteClient4193, compte_aux:client_id, credit:ttc, libelle:"Avoir "+avoir.numero+" - "+cl.nom });

  creerEcriture({
    date: avoir.date, journal:"VTE",
    libelle: "Avoir "+(AVOIR_TYPES[type]?.label||type)+" - "+cl.nom+(motif?" - "+motif:""),
    reference: avoir.numero,
    lignes,
    source_table:"avoirs", source_id:avoir.id, auto:true
  });

  saveState();
  return avoir;
}

// Applique un avoir sur une facture (réduit le reste à payer)
function appliquerAvoir(avoirId, factureId, montantApplique){
  const avoir = STATE.avoirs.find(a=>a.id===avoirId);
  const fac = STATE.factures.find(f=>f.id===factureId);
  if(!avoir || !fac){ toast("Avoir ou facture introuvable","error"); return false; }
  const restant = avoir.montant_restant;
  const reste = fac.reste_a_payer || 0;
  const montant = Math.min(parseFloat(montantApplique)||0, restant, reste);
  if(montant <= 0){ toast("Montant invalide","error"); return false; }

  // Met à jour la facture
  fac.reste_a_payer = (fac.reste_a_payer||0) - montant;
  if(fac.reste_a_payer <= 0) fac.statut = "Payée";

  // Met à jour l'avoir
  avoir.montant_utilise = (avoir.montant_utilise||0) + montant;
  avoir.montant_restant = avoir.montant_ttc - avoir.montant_utilise;
  avoir.statut = avoir.montant_restant <= 0 ? 'totalement_utilise' : 'partiellement_utilise';
  avoir.applications = avoir.applications || [];
  avoir.applications.push({
    id: uid("app_"),
    date: today(),
    type: "facture",
    facture_id: factureId,
    facture_numero: fac.numero,
    montant,
    created_at: now()
  });

  // Écriture comptable : Débit 4193 / Crédit 411(client) — solde la créance avec l'avoir
  const cl = getClient(avoir.client_id);
  const compteClient = cl?.compte_compta || "411";
  creerEcriture({
    date: today(), journal:"OD",
    libelle: "Application avoir "+avoir.numero+" sur facture "+fac.numero,
    reference: avoir.numero+"/"+fac.numero,
    lignes: [
      { compte:"4193", compte_aux:avoir.client_id, debit:montant, libelle:"Application avoir" },
      { compte:compteClient, compte_aux:avoir.client_id, credit:montant, libelle:"Solde facture "+fac.numero }
    ],
    source_table:"avoirs", source_id:avoir.id, auto:true
  });

  saveState();
  toast(`✓ ${fmtFCFA(montant)} appliqué de ${avoir.numero} sur ${fac.numero}`,"success");
  return true;
}

// Rembourse un avoir (en espèces / Wave / etc.)
function rembourserAvoir(avoirId, montant, mode, reference){
  const avoir = STATE.avoirs.find(a=>a.id===avoirId);
  if(!avoir){ toast("Avoir introuvable","error"); return false; }
  const m = Math.min(parseFloat(montant)||0, avoir.montant_restant);
  if(m <= 0){ toast("Montant invalide","error"); return false; }

  avoir.montant_utilise = (avoir.montant_utilise||0) + m;
  avoir.montant_restant = avoir.montant_ttc - avoir.montant_utilise;
  avoir.statut = avoir.montant_restant <= 0 ? 'rembourse' : 'partiellement_utilise';
  avoir.applications = avoir.applications || [];
  avoir.applications.push({
    id: uid("app_"),
    date: today(),
    type: "remboursement",
    mode: mode || "Espèces",
    montant: m,
    reference: reference || '',
    created_at: now()
  });

  // Écriture : Débit 4193 / Crédit compte trésorerie selon mode
  const compteTreso = compteTresorerie(mode);
  const journal = mode==="Espèces" ? "CAI" :
                  mode==="Wave" ? "WAV" :
                  mode==="Orange Money" ? "OM" :
                  mode==="MTN MoMo" ? "MTN" : "BNQ";
  creerEcriture({
    date: today(), journal,
    libelle: "Remboursement avoir "+avoir.numero+" en "+mode,
    reference: avoir.numero+(reference?"/"+reference:""),
    lignes: [
      { compte:"4193", compte_aux:avoir.client_id, debit:m, libelle:"Remboursement avoir" },

  saveState();

// Stock d'avoirs disponibles pour un client (somme des montants_restants)
function clientAvoirsRestants(clientId){
  return (STATE.avoirs||[])
    .filter(a=>a.client_id===clientId && a.montant_restant > 0)
    .reduce((s,a)=>s + a.montant_restant, 0);
}

// Détection automatique des avances (encaissements > factures impayées)
function detecterAvancesClients(){
  const map = {}; // client_id → solde
  // Total facturé par client
  (STATE.factures||[]).forEach(f=>{
    if(f.statut === 'Avoir') return;
    if(!map[f.client_id]) map[f.client_id] = 0;
    map[f.client_id] += f.montant_ttc||0;
  });
  // Moins les encaissements
  (STATE.encaissements||[]).forEach(e=>{
    if(!map[e.client_id]) map[e.client_id] = 0;
    map[e.client_id] -= e.montant||0;
  });
  // Avances = solde négatif (client a payé plus qu'il doit)
  const avances = [];
  for(const [cid, solde] of Object.entries(map)){
    if(solde < -100){ // tolérance 100 F arrondi
      const cl = getClient(cid);
      if(cl) avances.push({client_id:cid, client_nom:cl.nom, montant:Math.abs(solde)});
    }
  }
  return avances;
}

    `;

  }
  // Mode Supabase : gestion classique multi-utilisateurs
  w.innerHTML = `
    <div class="view-head">

window.loadUsersList = async function(){
  const cnt = document.getElementById('usersList');
  if(!cnt) return;
  const sb = await ensureSupabase();
  if(!sb || !_authUser){ cnt.innerHTML = '<div class="empty"><span class="ico">🔐</span>Connectez-vous d\'abord</div>'; return; }
  cnt.innerHTML = '<div class="empty"><span class="ico">⏳</span>Chargement…</div>';
  try {
    const { data, error } = await sb.from('profiles').select('*').order('created_at',{ascending:false});
    if(error){ cnt.innerHTML = '<div class="empty"><span class="ico">❌</span>'+escapeHtml(error.message)+'</div>'; return; }
    if(!data || data.length===0){ cnt.innerHTML = '<div class="empty"><span class="ico">📋</span>Aucun utilisateur · Créez-en un avec le bouton ci-dessus</div>'; return; }
    cnt.innerHTML = `<table class="tbl"><thead><tr><th>Nom</th><th>Email</th><th>Rôle</th><th>Tenant</th><th>Inscrit le</th><th>Dernière conn.</th><th>Actions</th></tr></thead><tbody>
      ${data.map(u=>{
        const r = ROLES_DEF[u.role] || {ico:'?',label:u.role||'?',color:'#64748b'};
        const isMe = u.id === _authUser?.id;
        return `<tr ${isMe?'style="background:var(--primary-light)"':''}>
          <td><strong>${escapeHtml(u.full_name||'(sans nom)')}</strong> ${isMe?'<span class="pill ok" style="margin-left:6px">vous</span>':''}</td>
          <td class="f12">${escapeHtml(u.email||'?')}</td>
          <td><span class="pill" style="background:${r.color};color:#fff">${r.ico} ${escapeHtml(r.label)}</span></td>
          <td class="f12 mono">${escapeHtml(u.tenant_id||'sanix_main')}</td>
          <td class="f12">${u.created_at?fmtDate(u.created_at):'-'}</td>
          <td class="f12">${u.derniere_connexion?fmtDateTime(u.derniere_connexion):'-'}</td>
          <td>
            ${!isMe?`<button class="btn sm" onclick="changeUserRole('${u.id}','${escapeHtml((u.full_name||u.email||'').replace(/'/g,'&apos;'))}','${u.role||'manager'}')">⚙ Rôle</button>`:''}
          </td>
        </tr>`;
      }).join("")}
    </tbody></table>
    <div class="hint mt-2">💡 Les rôles modifient instantanément les permissions. Les utilisateurs verront le changement à leur prochaine action.</div>`;
  } catch(e){ cnt.innerHTML = '<div class="empty"><span class="ico">❌</span>'+escapeHtml(e.message)+'</div>'; }
};

window.doCreateUser = async function(){
  const name  = ($("#cu_name").value||"").trim();
  const email = ($("#cu_email").value||"").trim().toLowerCase();
  const pwd   = $("#cu_pwd").value;
  const role  = $("#cu_role").value;
  if(!name || !email || !pwd){ toast("Tous les champs sont requis","error"); return; }
  if(!email.includes('@')){ toast("Email invalide","error"); return; }
  if(pwd.length < 6){ toast("Mot de passe trop court (min 6 caractères)","error"); return; }

  const sb = await ensureSupabase();
  if(!sb){ toast("Connexion Supabase impossible","error"); return; }

  // 🔑 Astuce : client temporaire SANS persistance pour ne pas écraser la session admin
  let tmpClient;
  try {
    tmpClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
      auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false }
    });
  } catch(e){
    toast("Erreur création client temporaire : "+e.message, "error");
    return;
  }

  toast("Création du compte…", "info");
  try {
    const { data, error } = await tmpClient.auth.signUp({
      email, password: pwd,
      options: { data: { full_name: name, role } }
    });
    if(error){
      let msg = error.message;
      if(msg.toLowerCase().includes('already registered')) msg = "Cet email est déjà inscrit dans la base";
      toast("Erreur : "+msg, "error");
      return;
    }

    // Met à jour le rôle dans profiles (le trigger handle_new_user prend par défaut "manager")
    if(data.user?.id){
      // Attente courte que le trigger crée le profile
      await new Promise(r=>setTimeout(r,400));
      const { error: e2 } = await sb.from('profiles').update({
        role,
        full_name: name
      }).eq('id', data.user.id);
      if(e2) console.warn("[users] Maj rôle/nom profile :", e2.message);
    }

    closeModal();

    // Affiche les credentials pour transmission
    MODALS.credentialsCree = ()=>modalShell("✓ Compte créé avec succès", `
      <div class="card" style="background:var(--primary-light);border:2px solid var(--primary)">
        <h3 style="margin:0 0 8px;color:var(--primary)">Identifiants pour ${escapeHtml(name)}</h3>
        <div class="f12 muted mb-2">À transmettre à l'utilisateur — il ne sera plus possible de récupérer le mot de passe</div>
        <table style="width:100%;font-family:var(--ff-mono);font-size:14px">
          <tr><td style="padding:4px 0;font-weight:700">Email :</td><td><span style="background:#fff;padding:3px 8px;border-radius:4px;display:inline-block">${escapeHtml(email)}</span></td></tr>
          <tr><td style="padding:4px 0;font-weight:700">Mot de passe :</td><td><span style="background:#fff;padding:3px 8px;border-radius:4px;display:inline-block">${escapeHtml(pwd)}</span></td></tr>
          <tr><td style="padding:4px 0;font-weight:700">Rôle :</td><td>${ROLES_DEF[role]?.ico||''} ${escapeHtml(ROLES_DEF[role]?.label||role)}</td></tr>
          <tr><td style="padding:4px 0;font-weight:700">URL :</td><td><span class="f12">${escapeHtml(location.origin)}</span></td></tr>
        </table>
      </div>
      <div class="row row-2 mt-2">
        <button class="btn block" onclick="copyCredentials('${escapeHtml(email)}','${escapeHtml(pwd)}','${escapeHtml(name)}')">📋 Copier</button>
        <a class="btn block" style="background:#25D366" target="_blank" href="https://wa.me/?text=${encodeURIComponent('Bonjour '+name+',\n\nVoici vos identifiants pour Sanix DistriPro ERP :\n\nEmail : '+email+'\nMot de passe : '+pwd+'\nRôle : '+(ROLES_DEF[role]?.label||role)+'\nURL : '+location.origin+'\n\nVeuillez changer votre mot de passe après la première connexion.')}">📱 WhatsApp</a>
      </div>
      <div class="hint mt-2">⚠️ <strong>Important :</strong> notez ces identifiants maintenant. Le mot de passe ne sera plus jamais affiché en clair.</div>
    `, `<button class="btn" onclick="closeModal();loadUsersList()">Fermer</button>`);
    openModal('credentialsCree');
    toast(`✓ Utilisateur ${name} créé`, "success");

  } catch(e){ toast("Erreur : "+e.message, "error"); }
};

window.copyCredentials = function(email, pwd, name){
  const txt = `Sanix DistriPro ERP - Identifiants pour ${name}\n\nEmail : ${email}\nMot de passe : ${pwd}\nURL : ${location.origin}\n\nVeuillez changer votre mot de passe après la première connexion.`;
  navigator.clipboard.writeText(txt).then(
    ()=>toast("✓ Copié dans le presse-papier","success"),
    ()=>toast("Copie impossible","error")
  );
};

window.changeUserRole = function(userId, userName, currentRole){
  // Liste des rôles disponibles pour le prompt
  const rolesList = Object.entries(ROLES_DEF).map(([k,r])=>`${k} (${r.label})`).join('\n  - ');
  const newRole = prompt(
    `Nouveau rôle pour ${userName} ?\nActuel : ${currentRole}\n\nValeurs possibles :\n  - ${rolesList}`,
    currentRole
  );
  if(!newRole || newRole === currentRole) return;
  if(!ROLES_DEF[newRole]){
    toast("Rôle invalide. Valeurs : "+Object.keys(ROLES_DEF).join(', '),"error");
    return;
  }
  if(!confirm(`Confirmer le changement de rôle de ${userName} :\n${currentRole} → ${newRole} ?`)) return;

  ensureSupabase().then(async sb=>{
    const { error } = await sb.from('profiles').update({ role: newRole }).eq('id', userId);
    if(error){ toast("Erreur : "+error.message,"error"); return; }
    toast(`✓ ${userName} est maintenant ${ROLES_DEF[newRole].ico} ${ROLES_DEF[newRole].label}`,"success");
    loadUsersList();
  });
};

window.addEventListener("DOMContentLoaded", ()=>{
  fillContextSelector();
  renderSidebar();
  renderBnav();
  route("dashboard");
  if(firstLaunch) toast("Bienvenue sur Sanix DistriPro ERP · Données démo chargées 🍺","success");
  if(!HAS_LS) toast("⚠️ localStorage indisponible — mode mémoire (données perdues à la fermeture)","warn");
  // hooks après render dynamique des modaux
  document.body.addEventListener("input", (e)=>{
    if(e.target.id==="m_rc" || e.target.id==="m_rb") recomputeFac();
  });

  // INIT COMPTABILITÉ : charge plan comptable et auto-génère les écritures manquantes
  loadPlanComptable();
  if(STATE.ecritures.length === 0 && (STATE.factures||[]).length > 0){
    setTimeout(()=>{
      autoGenMissingEcritures();
      const c = STATE.ecritures.length;
      if(c > 0) toast(`📊 Module comptabilité : ${c} écritures auto-générées depuis vos données`, "info");
    }, 1000);
  }

  // Magic Link : si l'URL contient un token, charge Supabase pour le traiter
  if(window.location.hash.includes('access_token=') || window.location.hash.includes('type=magiclink')){
    toast("⏳ Traitement du lien magique…","info");
    ensureSupabase().then(sb=>{
      if(!sb) return;
      setTimeout(async ()=>{
        const { data } = await sb.auth.getSession();
        if(data?.session){
          _authUser = data.session.user;
          toast("✓ Connecté via lien magique : "+_authUser.email,"success");
          history.replaceState(null,'',window.location.pathname);
          route("parametrage");
        } else {
          toast("Lien magique non reconnu — réessayez","error");
        }
      }, 500);
    });
  } else {
    // Sinon, vérifie silencieusement si une session existe (Supabase persiste dans localStorage)
    const sessKey = 'sb-' + SUPABASE_PROJECT_REF + '-auth-token';
    if(localStorage.getItem(sessKey)){
      // Pré-charge Supabase pour initialiser _authUser et démarrer auto-sync
      // (charge la lib mais ne crash pas si offline)
      ensureSupabase().then(()=>{
        updateSyncBadge();
        // Démarre l'auto-sync si elle est activée
        if(STATE.config.auto_sync_enabled && _authUser){
          startAutoSync();
        }
      });
    }
  }

  // Restaure la dernière version cloud connue
  if(STATE.config._lastCloudVersion){
    _lastCloudVersion = STATE.config._lastCloudVersion;
  }

  // Initialise le badge (état non connecté par défaut)
  setTimeout(updateSyncBadge, 100);

  // Système de login : affiche l'écran de connexion au démarrage si nécessaire
  setTimeout(initLoginGate, 300);
});
